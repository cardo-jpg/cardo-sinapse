<!DOCTYPE html>
<html lang="pt-BR">
{% from "_icon.html" import icon %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cérebro — Sinapse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css?v=6">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       Cérebro — workspace de atendimento (Commit 2: estrutura base, Alpine)
       Usa os tokens globais do style.css (Linear dark). Sem paleta própria.
       ═══════════════════════════════════════════════════════════════════════ */

    [x-cloak] { display: none !important; }

    /* Trava o viewport: só .cb-messages scrolla; sidebar/contexto ficam fixos.
       Sem isso a página inteira cresce e as colunas "desconfiguram" no scroll. */
    html, body { height: 100%; overflow: hidden; }
    .sinapse-shell { height: 100vh; overflow: hidden; }

    /* sinapse-main vira linha: [painel contexto | chat] */
    .cb-main {
      height: 100vh;
      flex-direction: row !important;
      overflow: hidden !important;
      background: var(--bg-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
    }

    /* ── Painel de contexto (coluna da direita) ───────────────────────────── */
    .cb-context {
      width: 280px; flex-shrink: 0;
      background: var(--bg-primary);
      border-left: 1px solid var(--border-subtle);
      display: flex; flex-direction: column;
      overflow-y: auto; min-height: 0;
      order: 2;  /* chat à esquerda, contexto à direita */
    }
    .cb-context-head {
      padding: var(--space-4) var(--space-4) var(--space-2);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold);
      text-transform: uppercase; letter-spacing: var(--letter-spacing-wide);
      color: var(--text-tertiary);
    }
    .cb-cards { padding: 0 var(--space-3) var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); }
    .cb-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: var(--space-3);
    }
    .cb-card-head {
      display: flex; align-items: center; gap: var(--space-2);
      font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
      color: var(--text-secondary); margin-bottom: var(--space-2);
    }
    .cb-card-head svg { width: 14px; height: 14px; color: var(--text-tertiary); }
    .cb-card-empty {
      font-size: var(--font-size-sm); color: var(--text-tertiary);
      line-height: var(--line-height-normal);
    }
    .cb-card-head .cb-badge {
      margin-left: auto; min-width: 18px; height: 18px; padding: 0 5px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent); color: #fff; font-size: 11px; font-weight: var(--font-weight-semibold);
      border-radius: 999px;
    }
    /* key-value (Performance) */
    .cb-kv { display: flex; flex-direction: column; gap: 5px; }
    .cb-perf-period { margin-top: 8px; font-size: var(--font-size-xs); color: var(--text-tertiary); }
    .cb-kv-row { display: flex; justify-content: space-between; gap: 10px; font-size: var(--font-size-sm); }
    .cb-kv-row > span:first-child { color: var(--text-tertiary); flex-shrink: 0; }
    .cb-kv-row > span:last-child { color: var(--text-secondary); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* WhatsApp */
    .cb-wa-meta { font-size: var(--font-size-xs); color: var(--text-tertiary); margin-bottom: 3px; }
    .cb-wa-preview { font-size: var(--font-size-sm); color: var(--text-secondary); line-height: var(--line-height-normal);
                     display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    /* listas (Atas, Tarefas) */
    .cb-list { display: flex; flex-direction: column; gap: 7px; }
    .cb-list-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .cb-list-title { font-size: var(--font-size-sm); color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cb-list-meta { font-size: var(--font-size-xs); color: var(--text-tertiary); flex-shrink: 0; }

    /* ── Coluna 3: chat ───────────────────────────────────────────────────── */
    .cb-chat { flex: 1; min-width: 0; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }

    .cb-header {
      display: flex; align-items: center; gap: var(--space-3);
      padding: 0 var(--space-4); height: 52px; flex-shrink: 0;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
    }
    .cb-client-pill {
      display: inline-flex; align-items: center; gap: var(--space-2);
      background: var(--bg-tertiary); border: 1px solid var(--border-default);
      border-radius: 999px; padding: 5px 12px 5px 10px; cursor: pointer;
      color: var(--text-primary); font-size: var(--font-size-sm);
      transition: background .12s, border-color .12s;
    }
    .cb-client-pill:hover { background: var(--bg-elevated); border-color: var(--border-strong); }
    .cb-client-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .cb-client-sigla { font-weight: var(--font-weight-semibold); }
    .cb-client-name { color: var(--text-tertiary); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cb-client-pill svg { width: 13px; height: 13px; color: var(--text-tertiary); }

    /* dropdown de troca de cliente (seletor mínimo — ⌘K completo no Commit 4) */
    .cb-pill-wrap { position: relative; }
    .cb-client-menu {
      position: absolute; top: 42px; left: 0; z-index: 60;
      width: 300px; max-height: 60vh; display: flex; flex-direction: column;
      background: var(--bg-elevated); border: 1px solid var(--border-default);
      border-radius: 10px; padding: var(--space-2); box-shadow: 0 12px 32px rgba(0,0,0,.4);
    }
    .cb-client-search {
      width: 100%; padding: 7px 10px; margin-bottom: 6px;
      background: var(--bg-tertiary); border: 1px solid var(--border-default);
      border-radius: 8px; color: var(--text-primary); font-size: var(--font-size-sm); outline: none;
    }
    .cb-client-search:focus { border-color: var(--accent); }
    .cb-client-list { overflow-y: auto; }
    .cb-client-opt {
      display: flex; align-items: baseline; gap: 8px; width: 100%; text-align: left;
      padding: 7px 10px; border-radius: 6px; cursor: pointer; background: none; border: none;
      color: var(--text-secondary); font-size: var(--font-size-sm); text-decoration: none;
    }
    .cb-client-opt:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .cb-client-opt-sigla { font-weight: var(--font-weight-semibold); color: var(--text-primary); flex-shrink: 0; }
    .cb-client-opt-nome { color: var(--text-tertiary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .cb-header-right { margin-left: auto; display: flex; align-items: center; gap: var(--space-2); }
    .cb-kbd {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: var(--font-size-xs); color: var(--text-tertiary);
      padding: 4px 8px; border: 1px solid var(--border-subtle); border-radius: 6px;
      background: transparent;
    }
    .cb-kbd kbd {
      font-family: inherit; font-size: 10px; color: var(--text-secondary);
      background: var(--bg-elevated); border-radius: 4px; padding: 1px 5px;
    }
    .cb-ghost-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border-default);
      border-radius: 8px; height: 32px; padding: 0 12px; cursor: pointer;
      color: var(--text-secondary); font-size: var(--font-size-sm);
      transition: background .12s, color .12s, border-color .12s;
    }
    .cb-ghost-btn:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-strong); }
    .cb-ghost-btn svg { width: 14px; height: 14px; }
    .cb-new-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; height: 32px; padding: 0 14px; cursor: pointer;
      font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
      transition: background .12s;
    }
    .cb-new-btn:hover { background: var(--accent-hover); }
    .cb-new-btn svg { width: 14px; height: 14px; }

    /* drawer de conversas */
    .cb-drawer {
      position: absolute; top: 48px; right: var(--space-4); z-index: 50;
      width: 320px; max-height: 60vh; overflow-y: auto;
      background: var(--bg-elevated); border: 1px solid var(--border-default);
      border-radius: 10px; padding: var(--space-2);
      box-shadow: 0 12px 32px rgba(0,0,0,.4);
    }
    .cb-drawer-item {
      display: block; width: 100%; text-align: left;
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      background: none; border: none; color: var(--text-secondary);
      font-size: var(--font-size-sm); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cb-drawer-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .cb-drawer-empty { padding: 10px; font-size: var(--font-size-sm); color: var(--text-tertiary); }
    .cb-drawer-foot { border-top: 1px solid var(--border-subtle); margin-top: 6px; padding-top: 6px; }
    .cb-drawer-foot a { display: block; padding: 6px 10px; font-size: var(--font-size-xs); color: var(--text-tertiary); text-decoration: none; }
    .cb-drawer-foot a:hover { color: var(--accent); }

        /* ── mensagens ────────────────────────────────────────────────────────── */
    .cb-messages { flex: 1; min-height: 0; overflow-y: auto; padding: var(--space-6) var(--space-4); }
    .cb-thread { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--space-4); }

    /* estado vazio */
    .cb-empty { max-width: 640px; margin: 8vh auto 0; text-align: center; }
    .cb-empty h2 { font-size: var(--font-size-xl); font-weight: var(--font-weight-semibold); margin-bottom: var(--space-2); }
    .cb-empty p { color: var(--text-secondary); margin-bottom: var(--space-6); }
    .cb-suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); text-align: left; }
    .cb-suggestion {
      background: var(--bg-tertiary); border: 1px solid var(--border-subtle);
      border-radius: 10px; padding: var(--space-3); cursor: pointer;
      color: var(--text-secondary); font-size: var(--font-size-sm); line-height: var(--line-height-normal);
      transition: background .12s, border-color .12s, color .12s;
    }
    .cb-suggestion:hover { background: var(--bg-elevated); border-color: var(--border-default); color: var(--text-primary); }

    /* bolhas */
    .cb-msg { display: flex; }
    .cb-msg.user { justify-content: flex-end; }
    .cb-bubble {
      max-width: 82%; padding: 14px 18px; border-radius: 14px;
      font-size: var(--font-size-md); line-height: 1.65;
    }
    .cb-msg.user .cb-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; max-width: 75%; }
    .cb-msg.assistant .cb-bubble { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-subtle); border-bottom-left-radius: 4px; padding: 16px 20px; }
    /* markdown dentro do bubble — respiro */
    .cb-bubble > :first-child { margin-top: 0; }
    .cb-bubble > :last-child { margin-bottom: 0; }
    .cb-bubble p { margin: 0 0 .7em; }
    .cb-bubble h1, .cb-bubble h2, .cb-bubble h3, .cb-bubble h4 {
      margin: 1.15em 0 .55em; line-height: 1.3; font-weight: var(--font-weight-semibold);
    }
    .cb-bubble h1 { font-size: 1.2em; } .cb-bubble h2 { font-size: 1.12em; } .cb-bubble h3 { font-size: 1.05em; }
    .cb-bubble ul, .cb-bubble ol { margin: .5em 0 .85em; padding-left: 1.45em; }
    .cb-bubble li { margin: .35em 0; }
    .cb-bubble li::marker { color: var(--text-tertiary); }
    .cb-bubble strong { font-weight: var(--font-weight-semibold); color: var(--text-primary); }
    .cb-bubble a { color: var(--accent); text-decoration: underline; }
    .cb-bubble hr { border: none; border-top: 1px solid var(--border-default); margin: 1.1em 0; }
    .cb-bubble code { background: var(--bg-primary); padding: 1px 5px; border-radius: 4px; font-size: .9em; }
    .cb-bubble pre { background: var(--bg-primary); padding: 12px 14px; border-radius: 8px; overflow-x: auto; margin: .6em 0 .9em; }
    .cb-bubble pre code { background: none; padding: 0; }
    .cb-bubble table { border-collapse: collapse; width: 100%; margin: .7em 0 .95em; font-size: .94em; }
    .cb-bubble th, .cb-bubble td { padding: 7px 12px; text-align: left; border-bottom: 1px solid var(--border-subtle); vertical-align: top; }
    .cb-bubble th { color: var(--text-secondary); font-weight: var(--font-weight-semibold); }
    .cb-bubble tbody tr:last-child td { border-bottom: none; }

    .cb-typing { display: inline-flex; gap: 4px; }
    .cb-typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); animation: cb-blink 1.2s infinite both; }
    .cb-typing span:nth-child(2) { animation-delay: .2s; }
    .cb-typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes cb-blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── input ────────────────────────────────────────────────────────────── */
    .cb-input { flex-shrink: 0; border-top: 1px solid var(--border-subtle); padding: var(--space-3) var(--space-4); }
    .cb-input-inner {
      max-width: 720px; margin: 0 auto; display: flex; align-items: flex-end; gap: var(--space-2);
      background: var(--bg-tertiary); border: 1px solid var(--border-default);
      border-radius: 12px; padding: 8px 8px 8px 14px;
      transition: border-color .12s;
    }
    .cb-input-inner:focus-within { border-color: var(--accent); }
    .cb-input textarea {
      flex: 1; resize: none; border: none; outline: none; background: transparent;
      color: var(--text-primary); font-family: inherit; font-size: var(--font-size-md);
      line-height: 1.4; max-height: 160px; padding: 4px 0;
    }
    .cb-input textarea::placeholder { color: var(--text-tertiary); }
    .cb-send {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .12s, opacity .12s;
    }
    .cb-send:disabled { opacity: .4; cursor: not-allowed; }
    .cb-send:not(:disabled):hover { background: var(--accent-hover); }
    .cb-send svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
<div class="sinapse-shell">
  {% include "_sidebar.html" %}
  <main class="sinapse-main cb-main" x-data="cerebro()">
    <input type="hidden" id="cbUserName" value="{{ nav_username }}">

    <!-- ── Coluna 2: painel de contexto (dados reais — Commit 3) ── -->
    <aside class="cb-context">
      <div class="cb-context-head" x-text="client ? 'Contexto · ' + client.sigla : 'Contexto'"></div>
      <div class="cb-cards">

        <!-- Performance -->
        <div class="cb-card">
          <div class="cb-card-head">{{ icon("trending-up", size=14) }} Performance</div>
          <template x-if="contextLoading"><div class="cb-card-empty">Carregando…</div></template>
          <template x-if="!contextLoading && !client"><div class="cb-card-empty">Selecione um cliente.</div></template>
          <template x-if="!contextLoading && client && !context.performance"><div class="cb-card-empty">Sem dados.</div></template>
          <template x-if="!contextLoading && context.performance">
            <div>
              <div class="cb-kv">
                <template x-if="context.performance.investido!=null"><div class="cb-kv-row"><span>Investido</span><span x-text="fmtBRL(context.performance.investido)"></span></div></template>
                <template x-if="context.performance.leads!=null"><div class="cb-kv-row"><span>Leads</span><span x-text="fmtInt(context.performance.leads)"></span></div></template>
                <template x-if="context.performance.cpl!=null"><div class="cb-kv-row"><span>CPL</span><span x-text="fmtBRL(context.performance.cpl)"></span></div></template>
                <template x-if="context.performance.impressoes!=null"><div class="cb-kv-row"><span>Impressões</span><span x-text="fmtInt(context.performance.impressoes)"></span></div></template>
                <template x-if="context.performance.cliques!=null"><div class="cb-kv-row"><span>Cliques</span><span x-text="fmtInt(context.performance.cliques)"></span></div></template>
              </div>
              <div class="cb-perf-period" x-show="context.performance.periodo" x-text="'Google Ads · ' + context.performance.periodo"></div>
            </div>
          </template>
        </div>

        <!-- WhatsApp -->
        <div class="cb-card">
          <div class="cb-card-head">
            {{ icon("message-circle", size=14) }} WhatsApp
            <span class="cb-badge" x-show="context.whatsapp && context.whatsapp.nao_lidas" x-text="context.whatsapp ? context.whatsapp.nao_lidas : ''"></span>
          </div>
          <template x-if="contextLoading"><div class="cb-card-empty">Carregando…</div></template>
          <template x-if="!contextLoading && client && !context.whatsapp"><div class="cb-card-empty">Sem mensagens.</div></template>
          <template x-if="!contextLoading && context.whatsapp">
            <div>
              <div class="cb-wa-meta"><span x-text="context.whatsapp.ultima.autor"></span><span x-show="context.whatsapp.ultima.quando"> · <span x-text="context.whatsapp.ultima.quando"></span></span></div>
              <div class="cb-wa-preview" x-text="context.whatsapp.ultima.preview"></div>
            </div>
          </template>
        </div>

        <!-- Atas -->
        <div class="cb-card">
          <div class="cb-card-head">{{ icon("file-text", size=14) }} Atas</div>
          <template x-if="contextLoading"><div class="cb-card-empty">Carregando…</div></template>
          <template x-if="!contextLoading && (!client || !context.atas.length)"><div class="cb-card-empty">Nenhuma ata.</div></template>
          <template x-if="!contextLoading && context.atas.length">
            <div class="cb-list">
              <template x-for="a in context.atas" :key="a.doc_id">
                <div class="cb-list-row"><span class="cb-list-title" x-text="a.titulo"></span><span class="cb-list-meta" x-text="a.data"></span></div>
              </template>
            </div>
          </template>
        </div>

        <!-- Tarefas -->
        <div class="cb-card">
          <div class="cb-card-head">{{ icon("list-checks", size=14) }} Tarefas</div>
          <template x-if="contextLoading"><div class="cb-card-empty">Carregando…</div></template>
          <template x-if="!contextLoading && (!client || !context.tarefas.length)"><div class="cb-card-empty">Nenhuma tarefa aberta.</div></template>
          <template x-if="!contextLoading && context.tarefas.length">
            <div class="cb-list">
              <template x-for="(t, i) in context.tarefas" :key="i">
                <div class="cb-list-row"><span class="cb-list-title" x-text="t.titulo"></span><span class="cb-list-meta" x-text="t.prazo"></span></div>
              </template>
            </div>
          </template>
        </div>

      </div>
    </aside>

    <!-- ── Coluna 3: chat ── -->
    <section class="cb-chat">
      <header class="cb-header">
        <div class="cb-pill-wrap" @click.outside="clientMenu=false">
          <button class="cb-client-pill" @click="toggleClientMenu()" title="Trocar cliente">
            <span class="cb-client-dot"></span>
            <span class="cb-client-sigla" x-text="client ? client.sigla : 'Selecionar cliente'"></span>
            <span class="cb-client-name" x-show="client" x-text="client ? client.nome : ''"></span>
            {{ icon("chevron-down", size=13) }}
          </button>
          <div class="cb-client-menu" x-show="clientMenu" x-cloak x-transition>
            <input class="cb-client-search" x-ref="clientSearch" x-model="clientQ" placeholder="Buscar cliente…">
            <div class="cb-client-list">
              <template x-if="!clients.length"><div class="cb-drawer-empty">Carregando…</div></template>
              <template x-for="c in filteredClients" :key="c.sigla">
                <a class="cb-client-opt" :href="'/cerebro/' + encodeURIComponent(c.sigla)">
                  <span class="cb-client-opt-sigla" x-text="c.sigla"></span>
                  <span class="cb-client-opt-nome" x-text="c.nome"></span>
                </a>
              </template>
            </div>
          </div>
        </div>

        <div class="cb-header-right">
          <span class="cb-kbd">Trocar <kbd>⌘K</kbd></span>
          <button class="cb-ghost-btn" @click="convDrawer=!convDrawer">
            {{ icon("message-square", size=14) }} Conversas
          </button>
          <button class="cb-new-btn" @click="newChat()">
            {{ icon("plus", size=14, color="#ffffff") }} Novo chat
          </button>
        </div>

        <!-- drawer de conversas -->
        <div class="cb-drawer" x-show="convDrawer" x-cloak @click.outside="convDrawer=false" x-transition>
          <template x-if="!convs.length">
            <div class="cb-drawer-empty">Nenhuma conversa ainda.</div>
          </template>
          <template x-for="c in convs" :key="c.id">
            <button class="cb-drawer-item" @click="openConv(c.id)" x-text="c.title || 'Sem título'"></button>
          </template>
          <div class="cb-drawer-foot"><a href="/logs">Ver histórico completo →</a></div>
        </div>
      </header>

      <div class="cb-messages" x-ref="messages">
        <!-- estado vazio -->
        <template x-if="!messages.length">
          <div class="cb-empty">
            <h2 x-text="client ? ('Cliente: ' + client.nome) : 'Olá! Sou o Cérebro da Cardō.'"></h2>
            <p>Pergunte sobre performance, conversas, reuniões ou tarefas — ou comece por uma sugestão.</p>
            <div class="cb-suggestions">
              <template x-for="s in suggestions" :key="s">
                <button class="cb-suggestion" @click="useSuggestion(s)" x-text="s"></button>
              </template>
            </div>
          </div>
        </template>

        <!-- conversa -->
        <div class="cb-thread" x-show="messages.length">
          <template x-for="(m, i) in messages" :key="i">
            <div class="cb-msg" :class="m.role">
              <div class="cb-bubble" x-html="renderMd(m.content)"></div>
            </div>
          </template>
          <div class="cb-msg assistant" x-show="sending">
            <div class="cb-bubble"><span class="cb-typing"><span></span><span></span><span></span></span></div>
          </div>
        </div>
      </div>

      <div class="cb-input">
        <div class="cb-input-inner">
          <textarea x-ref="input" x-model="input" rows="1"
                    placeholder="Digite sua pergunta…"
                    @input="autoGrow($event)"
                    @keydown.enter="if(!$event.shiftKey){ $event.preventDefault(); send(); }"></textarea>
          <button class="cb-send" @click="send()" :disabled="!input.trim() || sending" aria-label="Enviar">
            {{ icon("arrow-up", size=16, color="#ffffff") }}
          </button>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
  window.__CEREBRO_CLIENT__ = {{ client|tojson }};

  function cerebro() {
    return {
      client: window.__CEREBRO_CLIENT__ || null,
      messages: [],
      input: '',
      sending: false,
      convDrawer: false,
      convs: [],
      convId: null,
      clientMenu: false, clients: [], clientsLoaded: false, clientQ: '',
      userName: (document.getElementById('cbUserName') || {}).value || 'colaborador',

      context: { performance: null, whatsapp: null, atas: [], tarefas: [] },
      contextLoading: false,

      // Sugestões estáticas — Commit 5 gera dinamicamente do contexto real
      suggestions: [
        'Resuma a situação atual deste cliente',
        'O que foi falado na última reunião?',
        'Quais tarefas estão abertas?',
        'Como está a performance das campanhas?',
      ],

      init() {
        this.$nextTick(() => window.lucide && lucide.createIcons());
        this.loadConvs();
        if (this.client) this.loadContext();
      },

      async loadContext() {
        if (!this.client) return;
        this.contextLoading = true;
        try {
          const r = await fetch('/api/cerebro/' + encodeURIComponent(this.client.sigla) + '/context');
          const d = await r.json();
          this.context = {
            performance: d.performance || null,
            whatsapp: d.whatsapp || null,
            atas: d.atas || [],
            tarefas: d.tarefas || [],
          };
        } catch (e) {}
        this.contextLoading = false;
      },
      fmtBRL(n) {
        if (n == null) return '';
        try { return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }); }
        catch (e) { return 'R$ ' + n; }
      },
      fmtInt(n) {
        if (n == null) return '';
        try { return n.toLocaleString('pt-BR'); } catch (e) { return '' + n; }
      },

      // Seletor mínimo de cliente (⌘K palette completo vem no Commit 4)
      toggleClientMenu() {
        this.clientMenu = !this.clientMenu;
        if (this.clientMenu && !this.clientsLoaded) this.loadClients();
        if (this.clientMenu) this.$nextTick(() => this.$refs.clientSearch && this.$refs.clientSearch.focus());
      },
      async loadClients() {
        try {
          const r = await fetch('/api/cerebro/clients');
          const d = await r.json();
          this.clients = d.clients || [];
          this.clientsLoaded = true;
        } catch (e) {}
      },
      get filteredClients() {
        const q = this.clientQ.trim().toLowerCase();
        if (!q) return this.clients;
        return this.clients.filter(c => (c.sigla + ' ' + c.nome).toLowerCase().includes(q));
      },
      renderMd(t) { return window.marked ? marked.parse(t || '') : (t || ''); },
      useSuggestion(s) { this.input = s; this.$refs.input && this.$refs.input.focus(); },
      autoGrow(e) { const el = e.target; el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; },
      scrollDown() { this.$nextTick(() => { const m = this.$refs.messages; if (m) m.scrollTop = m.scrollHeight; }); },

      newChat() { this.messages = []; this.convId = null; this.input = ''; this.$refs.input && this.$refs.input.focus(); },

      async loadConvs() {
        try {
          const r = await fetch('/api/conversations');
          const d = await r.json();
          this.convs = (Array.isArray(d) ? d : (d.conversations || [])).slice(0, 40);
        } catch (e) {}
      },

      async openConv(id) {
        try {
          const r = await fetch('/api/conversations/' + id);
          const d = await r.json();
          this.messages = (d.messages || []).filter(m => typeof m.content === 'string');
          this.convId = id; this.convDrawer = false; this.scrollDown();
        } catch (e) {}
      },

      async send() {
        const text = this.input.trim();
        if (!text || this.sending) return;
        this.messages.push({ role: 'user', content: text });
        this.input = '';
        if (this.$refs.input) this.$refs.input.style.height = 'auto';
        this.sending = true;
        this.scrollDown();
        try {
          const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: this.messages,
              user: this.userName,
              conv_id: this.convId,
              client: this.client ? this.client.sigla : null,
              client_name: this.client ? this.client.nome : null,
            }),
          });
          const d = await res.json();
          this.messages.push({ role: 'assistant', content: d.reply || '' });
          this.convId = d.conv_id;
          this.loadConvs();
        } catch (e) {
          this.messages.push({ role: 'assistant', content: 'Erro ao conectar. Tente novamente.' });
        }
        this.sending = false;
        this.scrollDown();
      },
    };
  }
</script>
</body>
</html>
