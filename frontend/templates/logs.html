<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cardô Brain — Histórico</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
<div class="sinapse-shell">
  {% include "_sidebar.html" %}
  <main class="sinapse-main">
  <div class="logs-page">
    <div class="logs-header">
      <h2>Cardô<span>Brain</span> — Histórico</h2>
    </div>
    <div class="logs-list">
      {% if not convs %}
        <p class="empty">Nenhuma conversa registrada ainda.</p>
      {% else %}
        {% for c in convs %}
        <div class="log-entry" onclick="window.location='/?conv={{ c.id }}'" style="cursor:pointer">
          <div class="log-meta">
            <span class="log-user">{{ c.user }}</span>
            <span class="log-time">{{ c.updated_at[:16].replace('T', ' às ') }}</span>
          </div>
          <div class="log-q">{{ c.title }}</div>
        </div>
        {% endfor %}
      {% endif %}
    </div>
  </div>
  </main>
</div>
</body>
</html>
