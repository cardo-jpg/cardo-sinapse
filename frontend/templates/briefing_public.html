<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Briefing — Cardō</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --navy:        #19196C;
      --navy-deep:   #0e0e44;
      --orange:      #E97919;
      --orange-soft: #f59854;
      --bg:          #f6f1ea;
      --paper:       #fffdf9;
      --text:        #1d1d2e;
      --muted:       #6b6878;
      --border:      #e9e3da;
      --accent-soft: #fbe7d4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .display { font-family: 'Fraunces', 'Inter', serif; font-weight: 600; letter-spacing: -.01em; }

    /* ── App shell ────────────────────────────────────────────────────────── */
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      padding: 22px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(255,253,249,.85);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 50;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-logo { height: 26px; width: auto; display: block; }
    @media (max-width: 640px) {
      .brand-logo { height: 22px; }
    }
    .progress-wrap { flex: 1; max-width: 380px; margin: 0 24px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: .72rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .08em; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--navy), var(--orange)); border-radius: 99px; transition: width .4s cubic-bezier(.2,.8,.2,1); }
    .save-status { font-size: .75rem; color: var(--muted); }
    .reset-link {
      background: transparent; border: none; padding: 6px 10px;
      font-family: inherit; font-size: .75rem; color: var(--muted);
      cursor: pointer; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .reset-link:hover { color: var(--orange); background: var(--paper); }

    /* ── Stage container ──────────────────────────────────────────────────── */
    .stage { flex: 1; display: flex; flex-direction: column; padding: 48px 24px 96px; }
    .stage-inner { max-width: 720px; width: 100%; margin: 0 auto; }

    /* ── Hero / Ritual ────────────────────────────────────────────────────── */
    .hero-eyebrow { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .25em; color: var(--orange); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .hero-eyebrow::before, .hero-eyebrow::after { content: ''; flex: 1; max-width: 40px; height: 1px; background: var(--orange); opacity: .5; }
    .hero-headline { font-size: clamp(2.2rem, 4.5vw, 3.4rem); line-height: 1.1; color: var(--navy); margin-bottom: 28px; }
    .hero-headline em { color: var(--orange); font-style: italic; }
    .hero-lead { font-size: 1.05rem; color: var(--muted); max-width: 580px; margin-bottom: 40px; }

    .ritual-card {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
      color: #fff;
      border-radius: 20px;
      padding: 32px 36px;
      margin-bottom: 32px;
      box-shadow: 0 24px 48px -16px rgba(25,25,108,.35);
      position: relative;
      overflow: hidden;
    }
    .ritual-card::before {
      content: '';
      position: absolute;
      top: -40%; right: -10%;
      width: 280px; height: 280px;
      background: radial-gradient(circle, var(--orange) 0%, transparent 70%);
      opacity: .25;
      pointer-events: none;
    }
    .ritual-title { font-size: .8rem; text-transform: uppercase; letter-spacing: .18em; opacity: .7; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .ritual-title::before { content: '✦'; color: var(--orange); }
    .ritual-headline { font-size: 1.4rem; margin-bottom: 18px; line-height: 1.3; }
    .ritual-list { list-style: none; display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; }
    .ritual-list li {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0;
      font-size: .92rem;
      border-bottom: 1px dashed rgba(255,255,255,.12);
    }
    .ritual-list li:last-child { border-bottom: none; }
    .ritual-list li::before {
      content: '';
      flex-shrink: 0;
      width: 18px; height: 18px;
      margin-top: 2px;
      border-radius: 50%;
      border: 1.5px solid var(--orange);
      background: transparent;
      transition: background .15s, border-color .15s;
    }
    .ritual-list li.checked::before {
      background: var(--orange);
      border-color: var(--orange);
      box-shadow: inset 0 0 0 4px var(--navy);
    }
    .ritual-list li { cursor: pointer; user-select: none; }
    .ritual-list li:hover { color: var(--orange-soft); }

    /* ── Section header ───────────────────────────────────────────────────── */
    .section-eyebrow { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .25em; color: var(--orange); margin-bottom: 12px; }
    .section-title { font-size: clamp(1.7rem, 3vw, 2.2rem); line-height: 1.2; color: var(--navy); margin-bottom: 12px; }
    .section-subtitle { font-size: 1rem; color: var(--muted); margin-bottom: 36px; max-width: 540px; }

    /* ── Field ────────────────────────────────────────────────────────────── */
    .field { margin-bottom: 32px; }
    .field-label {
      display: block;
      font-size: .98rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .field-required { color: var(--orange); margin-left: 4px; }
    .field-input, .field-textarea {
      width: 100%;
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s, background .15s;
      outline: none;
    }
    .field-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
    .field-input:focus, .field-textarea:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 4px rgba(25,25,108,.08);
      background: #fff;
    }
    .field-input::placeholder, .field-textarea::placeholder { color: #b0acba; }

    /* ── Currency input ───────────────────────────────────────────────────── */
    .currency-wrap { position: relative; display: flex; align-items: stretch; }
    .currency-prefix {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-weight: 600; font-size: 1rem; pointer-events: none;
    }
    .currency-input { padding-left: 44px; }

    /* ── Single select (radio cards) ──────────────────────────────────────── */
    .select-stack { display: flex; flex-direction: column; gap: 10px; }
    .opt-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .opt-card:hover { border-color: var(--orange); background: #fff; }
    .opt-card input[type="radio"] { display: none; }
    .opt-radio {
      width: 18px; height: 18px;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      transition: all .15s;
      position: relative;
    }
    .opt-card:hover .opt-radio { border-color: var(--orange); }
    .opt-card.opt-selected {
      border-color: var(--navy);
      background: linear-gradient(135deg, rgba(25,25,108,.04), rgba(233,121,25,.04));
      box-shadow: 0 0 0 3px rgba(25,25,108,.06);
    }
    .opt-card.opt-selected .opt-radio {
      border-color: var(--navy);
      background: var(--navy);
      box-shadow: inset 0 0 0 3.5px var(--paper);
    }
    .opt-text { font-size: .95rem; line-height: 1.4; color: var(--text); }
    .opt-card.opt-selected .opt-text { color: var(--navy); font-weight: 500; }
    .opt-other-input { margin-top: 4px; }

    /* ── Audio button on long_text fields ─────────────────────────────────── */
    .audio-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .audio-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 99px;
      font-family: inherit;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .audio-btn:hover { background: var(--navy-deep); }
    .audio-btn.recording { background: var(--orange); animation: pulse 1.4s infinite; }
    .audio-btn.processing { background: var(--muted); cursor: wait; }
    .audio-btn[disabled] { opacity: .55; cursor: not-allowed; }
    .audio-hint { font-size: .78rem; color: var(--muted); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(233,121,25,.5); }
      50%      { box-shadow: 0 0 0 10px rgba(233,121,25,0); }
    }
    .spin { display: inline-block; animation: spinrot 1s linear infinite; }
    @keyframes spinrot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── Nav buttons ──────────────────────────────────────────────────────── */
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 56px; gap: 16px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 24px;
      border-radius: 99px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .15s;
      letter-spacing: .01em;
    }
    .btn-primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .btn-primary:hover:not([disabled]) { background: var(--navy-deep); transform: translateY(-1px); box-shadow: 0 8px 24px -8px rgba(25,25,108,.5); }
    .btn-primary[disabled] { opacity: .5; cursor: not-allowed; }
    .btn-secondary { background: transparent; color: var(--navy); border-color: var(--border); }
    .btn-secondary:hover { background: var(--paper); border-color: var(--navy); }
    .btn-ghost { background: transparent; color: var(--muted); border-color: transparent; }
    .btn-ghost:hover { color: var(--navy); }

    .err-banner {
      background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
      border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
      font-size: .9rem;
    }

    /* ── Final / sent screen ──────────────────────────────────────────────── */
    .sent-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 24px 48px -16px rgba(25,25,108,.12);
    }
    .sent-icon {
      width: 88px; height: 88px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--orange), var(--orange-soft));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 2.4rem;
      box-shadow: 0 16px 32px -8px rgba(233,121,25,.45);
    }
    .sent-title { font-size: 1.8rem; color: var(--navy); margin-bottom: 12px; }
    .sent-sub { color: var(--muted); margin-bottom: 32px; max-width: 440px; margin-left: auto; margin-right: auto; }
    .sent-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ── Mobile ───────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .topbar { padding: 14px 18px; flex-wrap: wrap; gap: 10px; }
      .progress-wrap { order: 99; max-width: 100%; margin: 6px 0 0; flex-basis: 100%; }
      .stage { padding: 32px 20px 80px; }
      .ritual-card { padding: 24px; }
      .ritual-headline { font-size: 1.2rem; }
      .nav { flex-direction: column; }
      .nav .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="app" x-data="briefingWizard()" x-init="init()">

  <!-- Topbar -->
  <header class="topbar">
    <a class="brand" href="/briefing" aria-label="Cardō Marketing">
      <img src="/static/brand/cardo-logo-horizontal.png?v=3" alt="Cardō Marketing" class="brand-logo">
    </a>
    <div class="progress-wrap" x-show="step > 0 && step <= sectionsLen">
      <div class="progress-meta">
        <span x-text="`Etapa ${step} de ${sectionsLen}`"></span>
        <span x-text="currentSection?.title"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" :style="`width: ${(step/sectionsLen)*100}%`"></div></div>
    </div>
    <span class="save-status" x-show="step > 0 && step <= sectionsLen">
      <span x-show="!autoSaved">●</span><span x-show="autoSaved" style="color:#22c55e">✓</span>
      <span x-text="autoSaved ? 'Salvo no navegador' : 'Não salvo'"></span>
    </span>
    <button class="reset-link" x-show="step === 'done' || (step > 0 && step <= sectionsLen)"
            @click="resetBriefing()" type="button" title="Apagar respostas e começar do zero">
      Recomeçar
    </button>
  </header>

  <!-- Stage -->
  <main class="stage">
    <div class="stage-inner">

      <!-- ────────────────────────── STEP 0: HERO / RITUAL ────────────────── -->
      <template x-if="step === 0">
        <div>
          <div class="hero-eyebrow">Briefing inicial</div>
          <h1 class="hero-headline display" x-text="def.ritual.headline"></h1>
          <p class="hero-lead" x-text="def.ritual.lead"></p>

          <div class="ritual-card">
            <div class="ritual-title">Ritual de foco — checklist do briefing</div>
            <div class="ritual-headline display" x-text="def.subtitle"></div>
            <ul class="ritual-list">
              <template x-for="(item, idx) in def.ritual.checklist" :key="idx">
                <li :class="ritualChecks[idx] ? 'checked' : ''" @click="toggleRitual(idx)">
                  <span x-text="item"></span>
                </li>
              </template>
            </ul>
          </div>

          <div class="nav" style="justify-content: flex-end">
            <button class="btn btn-primary" @click="step = 1">
              Vamos começar
              <span style="font-size:1.1em">→</span>
            </button>
          </div>
        </div>
      </template>

      <!-- ────────────────────────── STEP 1..N: SECTIONS ──────────────────── -->
      <template x-if="step > 0 && step <= sectionsLen">
        <div>
          <div class="section-eyebrow" x-text="`Etapa ${step}/${sectionsLen}`"></div>
          <h2 class="section-title display" x-text="currentSection.title"></h2>
          <p class="section-subtitle" x-text="currentSection.subtitle"></p>

          <div class="err-banner" x-show="errorMsg" x-text="errorMsg"></div>

          <template x-for="field in currentSection.fields" :key="field.id">
            <div class="field">
              <label class="field-label">
                <span x-text="field.label"></span><template x-if="field.required"><span class="field-required">*</span></template>
              </label>

              <template x-if="field.type === 'short_text'">
                <input class="field-input" type="text"
                       :placeholder="field.placeholder || 'Digite sua resposta'"
                       x-model="responses[field.id]">
              </template>

              <template x-if="field.type === 'email'">
                <input class="field-input" type="email"
                       placeholder="seu@email.com"
                       x-model="responses[field.id]">
              </template>

              <template x-if="field.type === 'currency'">
                <div class="currency-wrap">
                  <span class="currency-prefix">R$</span>
                  <input class="field-input currency-input" type="text" inputmode="decimal"
                         placeholder="0,00"
                         :value="responses[field.id]"
                         @input="responses[field.id] = formatCurrency($event.target.value)">
                </div>
              </template>

              <template x-if="field.type === 'single_select'">
                <div class="select-stack">
                  <template x-for="opt in field.options" :key="opt">
                    <label class="opt-card" :class="responses[field.id]===opt ? 'opt-selected' : ''">
                      <input type="radio" :name="'f_'+field.id" :value="opt" x-model="responses[field.id]">
                      <span class="opt-radio"></span>
                      <span class="opt-text" x-text="opt"></span>
                    </label>
                  </template>
                  <template x-if="responses[field.id] === 'Outro'">
                    <input class="field-input opt-other-input" type="text"
                           placeholder="Especifique seu nicho…"
                           x-model="responses[field.id + '__other']">
                  </template>
                </div>
              </template>

              <template x-if="field.type === 'long_text'">
                <div>
                  <textarea class="field-textarea"
                            :placeholder="field.placeholder || 'Responda com calma — quanto mais detalhes, melhor.'"
                            x-model="responses[field.id]"></textarea>
                  <template x-if="field.audio">
                    <div class="audio-row">
                      <template x-if="!audioAvailable">
                        <button type="button" class="audio-btn" disabled title="Aguardando configuração da API">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                          Gravar áudio
                        </button>
                      </template>
                      <template x-if="audioAvailable">
                        <button type="button" class="audio-btn"
                                :class="{
                                  'recording': audioRec.fieldId === field.id && audioRec.state === 'recording',
                                  'processing': audioRec.fieldId === field.id && audioRec.state === 'processing'
                                }"
                                :disabled="audioRec.state !== 'idle' && audioRec.fieldId !== field.id"
                                @click="toggleAudio(field.id)">
                          <template x-if="!(audioRec.fieldId === field.id) || audioRec.state === 'idle'">
                            <span style="display:inline-flex;align-items:center;gap:8px">
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                              Gravar áudio
                            </span>
                          </template>
                          <template x-if="audioRec.fieldId === field.id && audioRec.state === 'recording'">
                            <span style="display:inline-flex;align-items:center;gap:8px">
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                              Parar (<span x-text="formatRecTime(audioRec.elapsed)"></span>)
                            </span>
                          </template>
                          <template x-if="audioRec.fieldId === field.id && audioRec.state === 'processing'">
                            <span style="display:inline-flex;align-items:center;gap:8px">
                              <span class="spin">⏳</span> Transcrevendo…
                            </span>
                          </template>
                        </button>
                      </template>
                      <span class="audio-hint" x-show="audioAvailable && (audioRec.fieldId !== field.id || audioRec.state === 'idle')">
                        Grave e o texto aparece transcrito automaticamente — você pode editar depois.
                      </span>
                      <span class="audio-hint" style="color:var(--orange)"
                            x-show="audioRec.fieldId === field.id && audioRec.state === 'recording'">
                        ● Gravando… clique em "Parar" quando terminar.
                      </span>
                      <span class="audio-hint" style="color:#b91c1c"
                            x-show="audioRec.errorMsg && audioRec.errorField === field.id"
                            x-text="audioRec.errorMsg"></span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <div class="nav">
            <button class="btn btn-ghost" @click="prev()" x-show="step > 1">
              <span style="font-size:1.1em">←</span> Anterior
            </button>
            <span x-show="step === 1"></span>
            <button class="btn btn-primary" @click="next()" :disabled="submitting">
              <span x-text="step === sectionsLen ? (submitting ? 'Enviando...' : 'Enviar briefing') : 'Próximo'"></span>
              <span style="font-size:1.1em" x-show="!submitting">→</span>
            </button>
          </div>
        </div>
      </template>

      <!-- ────────────────────────── STEP DONE ────────────────────────────── -->
      <template x-if="step === 'done'">
        <div class="sent-card">
          <div class="sent-icon">✓</div>
          <h2 class="sent-title display">Briefing enviado!</h2>
          <p class="sent-sub">
            Recebemos suas respostas. Em breve nosso time entra em contato pra agendar o
            próximo passo do seu onboarding.
          </p>
          <div class="sent-actions">
            <template x-if="pdfUrl">
              <a class="btn btn-primary" :href="pdfUrl + '?print=1'" target="_blank" rel="noopener">
                Baixar respostas em PDF
              </a>
            </template>
            <template x-if="pdfUrl">
              <a class="btn btn-secondary" :href="pdfUrl" target="_blank" rel="noopener">
                Visualizar resposta
              </a>
            </template>
            <button class="btn btn-ghost" @click="resetBriefing()" type="button">
              Começar novo briefing
            </button>
          </div>
        </div>
      </template>

    </div>
  </main>

</div>

<script>
function briefingWizard() {
  const definition       = {{ definition|tojson }};
  const audioAvailable   = {{ audio_available|tojson }};
  // Bump version when fluxo do estado mudar — evita resíduos antigos
  const SAVE_KEY = 'cardo_briefing_draft_v3';
  // Limpa keys antigas
  try {
    ['cardo_briefing_draft_v1', 'cardo_briefing_draft_v2'].forEach(k => localStorage.removeItem(k));
  } catch (e) {}

  return {
    def: definition,
    audioAvailable,
    step: 0,
    responses: {},
    ritualChecks: {},
    sectionsLen: definition.sections.length,
    errorMsg: '',
    submitting: false,
    autoSaved: false,
    pdfUrl: '',
    audioRec: {
      state: 'idle',     // idle | recording | processing
      fieldId: null,
      elapsed: 0,
      errorMsg: '',
      errorField: null,
      _mediaRecorder: null,
      _stream: null,
      _chunks: [],
      _timer: null,
      _started: 0,
    },

    get currentSection() {
      const idx = this.step - 1;
      return this.def.sections[idx] || null;
    },

    init() {
      // restore draft — ignora saved.step === 'done' (já enviado, sem dados pra remostrar)
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (raw) {
          const saved = JSON.parse(raw);
          if (saved.step === 'done') {
            localStorage.removeItem(SAVE_KEY);
          } else {
            this.responses    = saved.responses    || {};
            this.ritualChecks = saved.ritualChecks || {};
            if (Object.keys(this.responses).length) {
              this.step = (typeof saved.step === 'number') ? saved.step : 0;
            }
          }
        }
      } catch (e) {}
      // auto-save
      this.$watch('responses',    () => this.saveDraft(), { deep: true });
      this.$watch('ritualChecks', () => this.saveDraft(), { deep: true });
      this.$watch('step',         () => this.saveDraft());
    },

    saveDraft() {
      // Não persiste estado pós-envio — evita ficar preso na tela "enviado"
      if (this.step === 'done') {
        try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
        return;
      }
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          responses: this.responses,
          ritualChecks: this.ritualChecks,
          step: this.step,
        }));
        this.autoSaved = true;
        clearTimeout(this._saveT);
        this._saveT = setTimeout(() => { this.autoSaved = false; }, 1500);
      } catch (e) {}
    },

    resetBriefing() {
      try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
      this.responses = {};
      this.ritualChecks = {};
      this.errorMsg = '';
      this.pdfUrl = '';
      this.step = 0;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    toggleRitual(idx) { this.ritualChecks[idx] = !this.ritualChecks[idx]; },

    formatRecTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    },

    async toggleAudio(fieldId) {
      if (this.audioRec.state === 'idle') {
        await this.startRecording(fieldId);
      } else if (this.audioRec.state === 'recording' && this.audioRec.fieldId === fieldId) {
        await this.stopRecording();
      }
    },

    async startRecording(fieldId) {
      this.audioRec.errorMsg = '';
      this.audioRec.errorField = null;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Pick a mime the browser supports
        const mimes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
        const mime = mimes.find(m => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) || '';
        const rec = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
        this.audioRec._mediaRecorder = rec;
        this.audioRec._stream = stream;
        this.audioRec._chunks = [];
        this.audioRec._started = Date.now();
        this.audioRec.elapsed = 0;
        this.audioRec.fieldId = fieldId;
        this.audioRec.state = 'recording';

        rec.addEventListener('dataavailable', e => {
          if (e.data && e.data.size > 0) this.audioRec._chunks.push(e.data);
        });
        rec.addEventListener('stop', () => this._onRecordingStopped());
        rec.start(1000);

        this.audioRec._timer = setInterval(() => {
          this.audioRec.elapsed = (Date.now() - this.audioRec._started) / 1000;
          // Auto-stop em 5 minutos pra não estourar limite do Whisper
          if (this.audioRec.elapsed > 300) this.stopRecording();
        }, 250);
      } catch (e) {
        this.audioRec.state = 'idle';
        this.audioRec.fieldId = null;
        this.audioRec.errorField = fieldId;
        if (e && e.name === 'NotAllowedError') {
          this.audioRec.errorMsg = 'Permissão de microfone negada. Habilite nas preferências do navegador.';
        } else {
          this.audioRec.errorMsg = 'Não foi possível acessar o microfone.';
        }
      }
    },

    async stopRecording() {
      if (this.audioRec.state !== 'recording') return;
      try {
        this.audioRec._mediaRecorder?.stop();
      } catch (e) {}
      if (this.audioRec._timer) { clearInterval(this.audioRec._timer); this.audioRec._timer = null; }
    },

    async _onRecordingStopped() {
      // stop tracks
      try { this.audioRec._stream?.getTracks().forEach(t => t.stop()); } catch (e) {}

      const fieldId = this.audioRec.fieldId;
      const chunks  = this.audioRec._chunks;
      const mime    = this.audioRec._mediaRecorder?.mimeType || 'audio/webm';
      this.audioRec.state = 'processing';

      const blob = new Blob(chunks, { type: mime });
      if (blob.size < 1024) {
        this.audioRec.state = 'idle';
        this.audioRec.fieldId = null;
        this.audioRec.errorField = fieldId;
        this.audioRec.errorMsg = 'Áudio muito curto — tente de novo.';
        return;
      }

      const fd = new FormData();
      const ext = mime.includes('mp4') ? 'm4a' : mime.includes('ogg') ? 'ogg' : 'webm';
      fd.append('audio', blob, `briefing.${ext}`);

      try {
        const r = await fetch('/api/briefing/transcribe', { method: 'POST', body: fd });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.detail || 'erro_transcribe');
        }
        const { text } = await r.json();
        if (text) {
          const prev = (this.responses[fieldId] || '').trim();
          this.responses[fieldId] = prev ? (prev + '\n\n' + text) : text;
        }
        this.audioRec.errorMsg = '';
        this.audioRec.errorField = null;
      } catch (e) {
        this.audioRec.errorField = fieldId;
        this.audioRec.errorMsg = 'Falha ao transcrever. Tente de novo ou digite manualmente.';
      } finally {
        this.audioRec.state = 'idle';
        this.audioRec.fieldId = null;
        this.audioRec._chunks = [];
      }
    },

    formatCurrency(raw) {
      if (raw == null) return '';
      const digits = String(raw).replace(/\D/g, '');
      if (!digits) return '';
      const cents = digits.padStart(3, '0');
      const reais = cents.slice(0, -2).replace(/^0+/, '') || '0';
      const dec   = cents.slice(-2);
      return reais.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + ',' + dec;
    },

    validateCurrent() {
      const sec = this.currentSection;
      if (!sec) return true;
      for (const f of sec.fields) {
        if (!f.required) continue;
        const v = this.responses[f.id];
        if (!v || !String(v).trim()) {
          this.errorMsg = `Por favor preencha: ${f.label}`;
          return false;
        }
      }
      this.errorMsg = '';
      return true;
    },

    prev() {
      if (this.step > 1) this.step--;
      else this.step = 0;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    async next() {
      if (!this.validateCurrent()) return;
      if (this.step < this.sectionsLen) {
        this.step++;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      // Final step → submit
      await this.submit();
    },

    async submit() {
      this.submitting = true;
      this.errorMsg = '';
      try {
        const r = await fetch('/api/briefing/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            responses:    this.responses,
            client_name:  this.responses.nome  || '',
            client_email: this.responses.email || '',
          }),
        });
        if (!r.ok) throw new Error('submit_failed');
        const data = await r.json();
        this.pdfUrl = data.pdf_url;
        try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
        this.step = 'done';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (e) {
        this.errorMsg = 'Não conseguimos enviar agora. Tente de novo em alguns segundos.';
      } finally {
        this.submitting = false;
      }
    },
  };
}
</script>

</body>
</html>
