<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinapse — Apresentações</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="home-body">
  <div class="home-container" style="max-width:600px; align-items:stretch;">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:32px;">
      <a href="/" class="ata-back-btn" style="font-size:1.2rem;">←</a>
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:1.5rem;">📊</span>
        <span style="font-size:1.2rem; font-weight:700; color:var(--text);">Gerar apresentação</span>
      </div>
    </div>

    <form id="form-apres" style="display:flex; flex-direction:column; gap:20px;">

      <div style="display:flex; flex-direction:column; gap:8px;">
        <label class="ata-label">Tipo</label>
        <div style="display:flex; gap:16px;">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--text); font-size:15px;">
            <input type="radio" name="tipo" value="debriefing" checked style="accent-color:var(--accent); width:16px; height:16px;">
            Debriefing de resultado
          </label>
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--text); font-size:15px;">
            <input type="radio" name="tipo" value="comercial" style="accent-color:var(--accent); width:16px; height:16px;">
            Apresentação comercial
          </label>
        </div>
      </div>

      <div style="display:flex; flex-direction:column; gap:8px;">
        <label class="ata-label" for="cliente">Cliente</label>
        <select id="cliente" name="cliente" class="ata-input">
          <option value="">— Selecione —</option>
          <option value="CC">CC — Clube do Contador</option>
          <option value="NF">NF — Nutrição Funcional</option>
          <option value="PV">PV — Patricia Voggt</option>
          <option value="HIRE">HIRE — C.Up Hire</option>
          <option value="SRW">SRW — Sorriso</option>
          <option value="SCALE">SCALE — Scale</option>
          <option value="HDLT">HDLT — HDLT</option>
        </select>
      </div>

      <div style="display:flex; flex-direction:column; gap:8px;">
        <label class="ata-label" for="periodo">Período</label>
        <select id="periodo" name="periodo" class="ata-input">
          <option value="">— Selecione —</option>
        </select>
      </div>

      <div style="display:flex; flex-direction:column; gap:8px;">
        <label class="ata-label" for="contexto">Contexto / destaques</label>
        <textarea id="contexto" name="contexto" rows="5"
                  placeholder="Cole aqui métricas, resultados, ou qualquer informação extra que queira incluir na apresentação."
                  class="ata-input" style="resize:vertical; font-family:inherit;"></textarea>
      </div>

      <button type="submit" class="ata-btn-publish" id="btn-gerar" style="height:44px; font-size:1rem; border-radius:10px;">
        <span id="btn-text">Gerar PPTX</span>
        <span id="btn-loader" style="display:none">Gerando… pode levar ~30s</span>
      </button>
    </form>

    <div id="apres-erro" style="display:none; margin-top:16px; background:#2a1a1a; border:1px solid #c0392b; border-radius:10px; padding:14px; color:#e74c3c; font-size:14px;"></div>
  </div>

  <script>
    // Preenche os últimos 18 meses no select de período
    (function() {
      const sel = document.getElementById("periodo");
      const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                     "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
      const now = new Date();
      for (let i = 0; i < 18; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const label = meses[d.getMonth()] + " " + d.getFullYear();
        const opt = document.createElement("option");
        opt.value = label;
        opt.textContent = label;
        sel.appendChild(opt);
      }
    })();

    document.getElementById("form-apres").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-gerar");
      document.getElementById("btn-text").style.display = "none";
      document.getElementById("btn-loader").style.display = "inline";
      document.getElementById("apres-erro").style.display = "none";
      btn.disabled = true;

      const data = {
        tipo: document.querySelector('input[name="tipo"]:checked').value,
        cliente: document.getElementById("cliente").value.trim(),
        periodo: document.getElementById("periodo").value.trim(),
        contexto: document.getElementById("contexto").value.trim(),
      };

      try {
        const resp = await fetch("/api/apresentacao/gerar", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data),
        });

        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || "Erro desconhecido");
        }

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const cd = resp.headers.get("Content-Disposition") || "";
        const match = cd.match(/filename="(.+?)"/);
        a.download = match ? match[1] : "apresentacao.pptx";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        const el = document.getElementById("apres-erro");
        el.textContent = "Erro: " + err.message;
        el.style.display = "block";
      } finally {
        document.getElementById("btn-text").style.display = "inline";
        document.getElementById("btn-loader").style.display = "none";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
