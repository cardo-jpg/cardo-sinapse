<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Comercial — Sinapse</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }

    /* ── layout ── */
    body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    /* ── main ── */
    .fin-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

    /* ── topbar ── */
    .fin-topbar {
      padding: 16px 24px 0; display: flex; align-items: center;
      gap: 16px; flex-wrap: wrap; flex-shrink: 0;
    }
    .fin-title { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: .06em; text-transform: uppercase; }
    .fin-actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── buttons ── */
    .btn { padding: 7px 14px; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; border: none; transition: background .15s, opacity .15s; }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover:not(:disabled) { background: #e04400; }
    .btn-red { background: #3d1a1a; color: #ef5350; border: 1px solid #5c2d2d; }
    .btn-red:hover:not(:disabled) { background: #4a1f1f; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
    .btn-icon { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 5px; color: var(--muted); font-size: .85rem; transition: color .15s, background .15s; }
    .btn-icon:hover { color: var(--text); background: #ffffff10; }

    /* ── form inputs ── */
    .form-input {
      width: 100%; padding: 8px 10px; background: #0d0d0d;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: .82rem;
      transition: border-color .15s;
      font-family: inherit;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .form-select { appearance: none; cursor: pointer; }
    .form-textarea { resize: vertical; }

    /* ── kanban board ── */
    .crm-board { display: flex; gap: 14px; padding: 16px 24px 24px; overflow-x: auto; align-items: flex-start; flex: 1; }
    .crm-col { flex: 0 0 260px; display: flex; flex-direction: column; gap: 8px; }
    .crm-col-header { display: flex; align-items: center; gap: 8px; padding: 6px 4px 10px; }
    .crm-col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .crm-col-name { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text); }
    .crm-col-count { background: var(--border); color: var(--muted); font-size: .68rem; padding: 1px 7px; border-radius: 10px; font-weight: 600; margin-left: auto; }
    .crm-card {
      background: #161616; border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 14px; display: flex; flex-direction: column; gap: 8px;
      cursor: pointer; transition: border-color .15s, transform .1s;
    }
    .crm-card:hover { border-color: #444; transform: translateY(-1px); }
    .crm-card-title { font-size: .86rem; color: var(--text); font-weight: 500; line-height: 1.4; }
    .crm-card-company { font-size: .75rem; color: var(--muted); }
    .crm-card-value { font-size: .82rem; color: #4caf50; font-weight: 600; }
    .crm-card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .crm-tag { font-size: .65rem; padding: 2px 7px; border-radius: 5px; font-weight: 500; }
    .crm-add-btn {
      padding: 8px 6px; color: var(--muted); font-size: .78rem; cursor: pointer;
      display: flex; align-items: center; gap: 5px; border-radius: 8px;
      transition: color .15s, background .15s; border: none; background: none; width: 100%;
    }
    .crm-add-btn:hover { color: var(--text); background: #ffffff07; }

    /* ── drag and drop ── */
    .crm-card.dragging { opacity: .4; }
    .crm-col.drag-over { background: #ffffff05; border-radius: 10px; }

    /* ── drawer ── */
    .crm-drawer-overlay {
      position: fixed; inset: 0; background: #00000060; z-index: 100;
      display: flex; justify-content: flex-end;
    }
    .crm-drawer {
      width: 420px; background: #111; border-left: 1px solid var(--border);
      height: 100vh; overflow-y: auto; display: flex; flex-direction: column;
      padding: 24px; gap: 16px;
    }
    .crm-drawer-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .crm-form-row { display: flex; flex-direction: column; gap: 5px; }
    .crm-form-label {
      font-size: .72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
    }
    .crm-form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  </style>
</head>
<body x-data="crmApp()" x-init="init()" x-cloak>
    <!-- ── MAIN ── -->
    <main class="fin-main">

      <!-- topbar -->
      <div class="fin-topbar">
        <div class="fin-title">CRM — Pipeline Comercial</div>
        <div class="fin-actions">
          <button class="btn btn-accent" @click="openNew('prospeccao')">+ Novo Deal</button>
        </div>
      </div>

      <!-- summary strip -->
      <template x-if="board">
        <div style="padding: 10px 24px 0; display: flex; gap: 20px; flex-wrap: wrap; flex-shrink: 0;">
          <div style="font-size: .8rem; color: var(--muted);">
            <span style="color: var(--text); font-weight: 600;" x-text="board.deals.length"></span> deals
          </div>
          <div style="font-size: .8rem; color: #4caf50;">
            Ganhos: <span style="font-weight: 600;" x-text="formatBRL(board.deals.filter(d => d.stage_id === 'ganho').reduce((s, d) => s + d.value, 0))"></span>
          </div>
          <div style="font-size: .8rem; color: var(--muted);">
            Pipeline: <span style="color: var(--text); font-weight: 600;" x-text="formatBRL(board.deals.filter(d => !['ganho','perdido'].includes(d.stage_id)).reduce((s, d) => s + d.value, 0))"></span>
          </div>
          <div style="font-size: .8rem; color: #ef5350;">
            Perdidos: <span style="font-weight: 600;" x-text="board.deals.filter(d => d.stage_id === 'perdido').length"></span>
          </div>
        </div>
      </template>

      <!-- loading state -->
      <template x-if="loading">
        <div style="padding: 60px; text-align: center; color: var(--muted); font-size: .88rem;">Carregando...</div>
      </template>

      <!-- kanban board -->
      <template x-if="!loading && board">
        <div class="crm-board">
          <template x-for="stage in board.stages" :key="stage.id">
            <div class="crm-col"
              @dragover.prevent="onDragOver($event)"
              @dragenter="$el.classList.add('drag-over')"
              @dragleave="$el.classList.remove('drag-over')"
              @drop="$el.classList.remove('drag-over'); onDrop($event, stage.id)">

              <div class="crm-col-header">
                <div class="crm-col-dot" :style="`background:${stage.color}`"></div>
                <span class="crm-col-name" x-text="stage.name"></span>
                <span class="crm-col-count" x-text="dealsFor(stage.id).length"></span>
              </div>

              <template x-for="deal in dealsFor(stage.id)" :key="deal.id">
                <div class="crm-card"
                  draggable="true"
                  @dragstart="onDragStart($event, deal.id)"
                  @click="openEdit(deal)">
                  <div class="crm-card-title" x-text="deal.title"></div>
                  <div class="crm-card-company" x-text="deal.company" x-show="deal.company"></div>
                  <div class="crm-card-meta">
                    <template x-if="deal.value > 0">
                      <span class="crm-card-value" x-text="formatBRL(deal.value)"></span>
                    </template>
                    <template x-if="deal.owner">
                      <span class="crm-tag" style="background: #1a1a1a; color: var(--muted);" x-text="deal.owner"></span>
                    </template>
                    <template x-if="deal.due_date">
                      <span class="crm-tag" style="background: #1a2a1a; color: #4caf50;" x-text="deal.due_date"></span>
                    </template>
                    <template x-if="deal.origem">
                      <span class="crm-tag" style="background: #1a1a2a; color: #7986cb;" x-text="deal.origem"></span>
                    </template>
                  </div>
                </div>
              </template>

              <button class="crm-add-btn" @click="openNew(stage.id)">
                <span style="font-size: 1em;">+</span> Adicionar deal
              </button>
            </div>
          </template>
        </div>
      </template>

      <!-- deal drawer -->
      <template x-if="drawerOpen">
        <div class="crm-drawer-overlay" @click.self="closeDrawer()">
          <div class="crm-drawer">

            <div style="display: flex; align-items: center; justify-content: space-between;">
              <div class="crm-drawer-title" x-text="editDeal ? 'Editar Deal' : 'Novo Deal'"></div>
              <button class="btn-icon" @click="closeDrawer()">✕</button>
            </div>

            <!-- Stage pills -->
            <div class="crm-form-row">
              <div class="crm-form-label">Estágio</div>
              <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                <template x-for="stage in board.stages" :key="stage.id">
                  <button
                    style="padding: 4px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600; border: 1.5px solid; cursor: pointer; transition: opacity .15s;"
                    :style="`border-color:${stage.color}; color:${form.stage_id === stage.id ? '#111' : stage.color}; background:${form.stage_id === stage.id ? stage.color : 'transparent'};`"
                    @click="form.stage_id = stage.id"
                    x-text="stage.name">
                  </button>
                </template>
              </div>
            </div>

            <!-- Title -->
            <div class="crm-form-row">
              <label class="crm-form-label">Lead / Oportunidade *</label>
              <input class="form-input" type="text" x-model="form.title" placeholder="Nome do lead ou oportunidade">
            </div>

            <!-- Company + Contact -->
            <div class="crm-form-2col">
              <div class="crm-form-row">
                <label class="crm-form-label">Empresa</label>
                <input class="form-input" type="text" x-model="form.company" placeholder="Nome da empresa">
              </div>
              <div class="crm-form-row">
                <label class="crm-form-label">Contato</label>
                <input class="form-input" type="text" x-model="form.contact" placeholder="Nome do contato">
              </div>
            </div>

            <!-- Email + Phone -->
            <div class="crm-form-2col">
              <div class="crm-form-row">
                <label class="crm-form-label">E-mail</label>
                <input class="form-input" type="email" x-model="form.email" placeholder="email@empresa.com">
              </div>
              <div class="crm-form-row">
                <label class="crm-form-label">Telefone</label>
                <input class="form-input" type="text" x-model="form.phone" placeholder="(00) 00000-0000">
              </div>
            </div>

            <!-- Value + Owner -->
            <div class="crm-form-2col">
              <div class="crm-form-row">
                <label class="crm-form-label">Valor Estimado (R$)</label>
                <input class="form-input" type="number" min="0" step="0.01" x-model="form.value" placeholder="0,00">
              </div>
              <div class="crm-form-row">
                <label class="crm-form-label">Responsável</label>
                <input class="form-input" type="text" x-model="form.owner" placeholder="Nome do responsável">
              </div>
            </div>

            <!-- Origem + Due date -->
            <div class="crm-form-2col">
              <div class="crm-form-row">
                <label class="crm-form-label">Origem</label>
                <select class="form-input form-select" x-model="form.origem">
                  <option value="">— selecione —</option>
                  <option>Indicação</option>
                  <option>Inbound</option>
                  <option>Outbound</option>
                  <option>Evento</option>
                  <option>Redes Sociais</option>
                  <option>Outros</option>
                </select>
              </div>
              <div class="crm-form-row">
                <label class="crm-form-label">Data Limite</label>
                <input class="form-input" type="date" x-model="form.due_date">
              </div>
            </div>

            <!-- Notes -->
            <div class="crm-form-row">
              <label class="crm-form-label">Notas</label>
              <textarea class="form-input form-textarea" x-model="form.notes" placeholder="Observações, próximos passos..." style="min-height: 90px;"></textarea>
            </div>

            <!-- Actions -->
            <div style="display: flex; gap: 8px; justify-content: space-between; margin-top: 8px;">
              <div>
                <template x-if="editDeal">
                  <button class="btn btn-red" @click="deleteDeal()">Remover</button>
                </template>
              </div>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-ghost" @click="closeDrawer()">Cancelar</button>
                <button class="btn btn-accent" @click="saveDeal()" :disabled="!form.title">Salvar</button>
              </div>
            </div>

          </div>
        </div>
      </template>

    </main>

  <script>
    function crmApp() {
      return {
        board: null,
        loading: true,
        drawerOpen: false,
        editDeal: null,
        editStageId: null,
        form: {},
        dragDealId: null,

        async init() {
          await this.loadBoard();
        },

        async loadBoard() {
          this.loading = true;
          try {
            this.board = await this.api('GET', '/api/crm/board');
          } finally {
            this.loading = false;
          }
        },

        dealsFor(stageId) {
          return (this.board?.deals || []).filter(d => d.stage_id === stageId);
        },

        openNew(stageId) {
          this.editDeal = null;
          this.editStageId = stageId;
          this.form = {
            stage_id: stageId, title: '', company: '', contact: '',
            email: '', phone: '', value: '', owner: '', origem: '',
            due_date: '', notes: ''
          };
          this.drawerOpen = true;
        },

        openEdit(deal) {
          this.editDeal = deal;
          this.editStageId = deal.stage_id;
          this.form = { ...deal };
          this.drawerOpen = true;
        },

        closeDrawer() {
          this.drawerOpen = false;
          this.editDeal = null;
        },

        async saveDeal() {
          const body = { ...this.form, value: parseFloat(this.form.value || 0) || 0 };
          if (this.editDeal) {
            await this.api('PATCH', `/api/crm/deals/${this.editDeal.id}`, body);
          } else {
            await this.api('POST', '/api/crm/deals', body);
          }
          this.closeDrawer();
          await this.loadBoard();
        },

        async deleteDeal() {
          if (!confirm('Remover este deal?')) return;
          await this.api('DELETE', `/api/crm/deals/${this.editDeal.id}`);
          this.closeDrawer();
          await this.loadBoard();
        },

        async moveDeal(deal, stageId) {
          await this.api('PATCH', `/api/crm/deals/${deal.id}`, { stage_id: stageId });
          await this.loadBoard();
        },

        onDragStart(e, dealId) {
          this.dragDealId = dealId;
          e.dataTransfer.effectAllowed = 'move';
        },

        onDragOver(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
        },

        async onDrop(e, stageId) {
          e.preventDefault();
          if (this.dragDealId) {
            await this.api('PATCH', `/api/crm/deals/${this.dragDealId}`, { stage_id: stageId });
            this.dragDealId = null;
            await this.loadBoard();
          }
        },

        formatBRL(v) {
          return 'R$ ' + Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        },

        async api(method, url, body) {
          const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
          if (body) opts.body = JSON.stringify(body);
          const r = await fetch(url, opts);
          if (!r.ok) throw new Error(await r.text());
          return r.json();
        },
      };
    }
  </script>
{% include "_twemoji.html" %}
</body>
</html>
