<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinapse — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap">
  <style>
    :root {
      --bg:         #0a0a14;
      --bg-2:       #0f0f1c;
      --panel:      #14142a;
      --border:     #232342;
      --text:       #ebe9f5;
      --text-dim:   #a8a4ba;
      --muted:      #6b6786;
      --orange:     #E97919;
      --orange-soft:#f59854;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      min-height: 100vh;
    }

    /* Background canvas (constelação) */
    #constellation {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background:
        radial-gradient(1000px 600px at 30% 20%, rgba(25,25,108,.55) 0%, transparent 60%),
        radial-gradient(800px 500px at 80% 80%, rgba(233,121,25,.18) 0%, transparent 60%),
        var(--bg);
    }

    /* Center stage */
    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 15, 28, .72);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow:
        0 24px 48px -16px rgba(0,0,0,.55),
        0 0 0 1px rgba(233,121,25,.04) inset;
      animation: rise .8s cubic-bezier(.16,1,.3,1);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px) scale(.98); }
      to   { opacity: 1; transform: none; }
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .brand-logo {
      height: 44px;
      width: auto;
      filter: brightness(1.05);
    }
    .brand-name {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .01em;
      background: linear-gradient(135deg, #fff 0%, var(--orange-soft) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .brand-tag {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .26em;
      color: var(--muted);
      font-weight: 600;
    }

    .form-title {
      text-align: center;
      font-size: .92rem;
      color: var(--text-dim);
      margin-bottom: 22px;
      font-weight: 400;
    }

    form { display: flex; flex-direction: column; gap: 12px; }
    .field {
      position: relative;
    }
    .field input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: .92rem;
      font-family: inherit;
      transition: border-color .18s, background .18s, box-shadow .18s;
      outline: none;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:hover { border-color: #2d2d52; }
    .field input:focus {
      border-color: var(--orange);
      background: rgba(255,255,255,.05);
      box-shadow: 0 0 0 4px rgba(233,121,25,.12);
    }

    .btn {
      margin-top: 8px;
      padding: 14px 18px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .12s, box-shadow .18s, background .18s;
      letter-spacing: .01em;
    }
    .btn:hover {
      background: #d56b14;
      transform: translateY(-1px);
      box-shadow: 0 10px 22px -8px rgba(233,121,25,.55);
    }
    .btn:active { transform: translateY(0); }

    .error-msg {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #ff8a8a;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: .82rem;
      text-align: center;
      margin-bottom: 14px;
    }

    .footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-size: .72rem;
      color: var(--muted);
      z-index: 1;
      letter-spacing: .04em;
    }
    .footer span { color: var(--text-dim); font-weight: 600; }

    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; border-radius: 16px; }
      .brand-name { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <canvas id="constellation"></canvas>

  <div class="stage">
    <div class="card">
      <div class="brand">
        <img src="/static/logo.png" alt="Cardô Marketing" class="brand-logo">
        <div class="brand-name">Sinapse</div>
        <div class="brand-tag">Cardō Marketing</div>
      </div>

      {% if request.query_params.get('error') %}
      <div class="error-msg">Senha incorreta. Tente novamente.</div>
      {% endif %}

      <div class="form-title">Entre com suas credenciais para continuar</div>

      <form method="post" action="/login">
        <div class="field">
          <input type="text" name="username" placeholder="Seu usuário" autofocus required autocomplete="username">
        </div>
        <div class="field">
          <input type="password" name="password" placeholder="Senha de acesso" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn">Entrar</button>
      </form>
    </div>
  </div>

  <div class="footer">
    <span>Sinapse</span> · Plataforma interna da Cardō Marketing
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('constellation');
      const ctx = canvas.getContext('2d');

      // Constants
      const TH = 140;          // distância de conexão entre neurônios
      const TH_M = 180;        // distância de conexão com mouse
      const MAX_PULSES = 18;   // pulsos sinápticos simultâneos
      const PULSE_SPEED = 0.018; // 0→1 por frame (~55 frames de viagem)
      const FLASH_FRAMES = 26; // duração do flash no receptor
      const SPAWN_EVERY = 7;   // tenta criar pulso a cada N frames

      let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
      let neurons = [];     // {x,y,vx,vy,r,flash}
      let pulses = [];      // {a,b,t,col}
      let edges = [];       // pares conectados [iA, iB] recomputados por frame
      let mouse = { x: -1e6, y: -1e6 };
      let frame = 0;

      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width  = Math.floor(W * dpr);
        canvas.height = Math.floor(H * dpr);
        canvas.style.width  = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        spawn();
      }

      function spawn() {
        const target = Math.max(45, Math.min(95, Math.floor((W * H) / 19000)));
        neurons = [];
        for (let i = 0; i < target; i++) {
          // ~22% somas grandes (corpos celulares), resto dendritos/terminais pequenos
          const isSoma = Math.random() < 0.22;
          neurons.push({
            x: Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - .5) * .18,
            vy: (Math.random() - .5) * .18,
            r:  isSoma ? (2.4 + Math.random() * 2.2) : (0.7 + Math.random() * 1.0),
            soma: isSoma,
            // controle de curvatura único por neurônio (assina suas conexões)
            curveBias: (Math.random() - .5) * 0.55,
            phase: Math.random() * Math.PI * 2,
            flash: 0
          });
        }
        pulses = [];
      }

      // Curva Bezier quadrática entre dois neurônios — control point ortogonal
      function curveControl(a, b) {
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        // perpendicular normalizada, offset por curveBias dos dois
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = -dy / len;
        const ny =  dx / len;
        const off = (a.curveBias + b.curveBias) * 22;
        return { x: mx + nx * off, y: my + ny * off };
      }

      // Posição num ponto t da curva Bezier quadrática
      function bezierAt(a, c, b, t) {
        const u = 1 - t;
        return {
          x: u*u*a.x + 2*u*t*c.x + t*t*b.x,
          y: u*u*a.y + 2*u*t*c.y + t*t*b.y
        };
      }

      function trySpawnPulse() {
        if (pulses.length >= MAX_PULSES) return;
        if (edges.length === 0) return;
        const e = edges[(Math.random() * edges.length) | 0];
        const orange = Math.random() < 0.82;
        pulses.push({
          a: e[0],
          b: e[1],
          // snapshot do control point — neurônios podem se mover durante a viagem
          cx: e[2].x,
          cy: e[2].y,
          t: 0,
          col: orange ? [255, 170, 80] : [180, 200, 255]
        });
      }

      function step() {
        frame++;
        ctx.clearRect(0, 0, W, H);

        // Atualiza posições dos neurônios
        for (const p of neurons) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > W) p.vx *= -1;
          if (p.y < 0 || p.y > H) p.vy *= -1;
          if (p.flash > 0) p.flash--;
        }

        // Recomputa arestas (axônios curvos) + desenha
        edges.length = 0;
        for (let i = 0; i < neurons.length; i++) {
          const a = neurons[i];
          for (let j = i + 1; j < neurons.length; j++) {
            const b = neurons[j];
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const d2 = dx*dx + dy*dy;
            if (d2 < TH * TH) {
              const d = Math.sqrt(d2);
              const fade = 1 - d / TH;
              const c = curveControl(a, b);
              // axônio (curva azul fina)
              ctx.strokeStyle = `rgba(140,160,220,${fade * 0.16})`;
              ctx.lineWidth = 0.7;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.quadraticCurveTo(c.x, c.y, b.x, b.y);
              ctx.stroke();
              // terminais sinápticos: glow laranja nas duas pontas (constante)
              const glowR = 5 * fade;
              if (glowR > 1.4) {
                for (const end of [a, b]) {
                  const g = ctx.createRadialGradient(end.x, end.y, 0, end.x, end.y, glowR);
                  g.addColorStop(0, `rgba(255,160,80,${0.45 * fade})`);
                  g.addColorStop(0.5, `rgba(233,121,25,${0.15 * fade})`);
                  g.addColorStop(1, 'rgba(233,121,25,0)');
                  ctx.fillStyle = g;
                  ctx.beginPath();
                  ctx.arc(end.x, end.y, glowR, 0, Math.PI * 2);
                  ctx.fill();
                }
              }
              edges.push([i, j, c]);
            }
          }
          // linha pro mouse (também curva, mais suave)
          const mdx = a.x - mouse.x;
          const mdy = a.y - mouse.y;
          const md2 = mdx*mdx + mdy*mdy;
          if (md2 < TH_M * TH_M) {
            const md = Math.sqrt(md2);
            const fadeM = 1 - md / TH_M;
            const mouseNode = { x: mouse.x, y: mouse.y, curveBias: 0 };
            const cm = curveControl(a, mouseNode);
            ctx.strokeStyle = `rgba(233,121,25,${fadeM * 0.55})`;
            ctx.lineWidth = 1.0;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.quadraticCurveTo(cm.x, cm.y, mouse.x, mouse.y);
            ctx.stroke();
          }
        }

        // Spawn de pulsos sinápticos
        if (frame % SPAWN_EVERY === 0) trySpawnPulse();

        // Atualiza + desenha pulsos com trail
        for (let k = pulses.length - 1; k >= 0; k--) {
          const ps = pulses[k];
          const a = neurons[ps.a];
          const b = neurons[ps.b];
          if (!a || !b) { pulses.splice(k, 1); continue; }
          ps.t += PULSE_SPEED;

          if (ps.t >= 1) {
            // chegou no destino → flash + remove
            b.flash = FLASH_FRAMES;
            pulses.splice(k, 1);
            continue;
          }

          // posição atual + trail (5 amostras) seguindo a curva Bezier
          const cp = { x: ps.cx, y: ps.cy };
          for (let s = 0; s < 5; s++) {
            const tt = Math.max(0, ps.t - s * 0.045);
            const p = bezierAt(a, cp, b, tt);
            const x = p.x, y = p.y;
            const fade = (1 - s * 0.22);
            const r = 2.6 - s * 0.5;
            // glow (radial)
            const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
            grad.addColorStop(0, `rgba(${ps.col[0]},${ps.col[1]},${ps.col[2]},${0.95 * fade})`);
            grad.addColorStop(0.4, `rgba(${ps.col[0]},${ps.col[1]},${ps.col[2]},${0.25 * fade})`);
            grad.addColorStop(1, `rgba(${ps.col[0]},${ps.col[1]},${ps.col[2]},0)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, r * 4, 0, Math.PI * 2);
            ctx.fill();
            // núcleo
            if (s === 0) {
              ctx.fillStyle = `rgba(255,255,255,${0.95 * fade})`;
              ctx.beginPath();
              ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }

        // Neurônios — somas com halo azul ambiente; terminais pequenos puros
        for (const p of neurons) {
          const breathe = 0.5 + 0.5 * Math.sin(frame * 0.025 + p.phase);
          const flashK = p.flash / FLASH_FRAMES;
          const rEff = p.r * (1 + breathe * 0.18 + flashK * 1.3);

          // halo azul ambiente em somas (sempre visível)
          if (p.soma) {
            const haloR = rEff * 3.6;
            const halo = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, haloR);
            halo.addColorStop(0,   'rgba(120,160,255,0.28)');
            halo.addColorStop(0.45,'rgba(80,110,200,0.12)');
            halo.addColorStop(1,   'rgba(40,60,140,0)');
            ctx.fillStyle = halo;
            ctx.beginPath();
            ctx.arc(p.x, p.y, haloR, 0, Math.PI * 2);
            ctx.fill();
          }

          // halo laranja expandido durante flash
          if (flashK > 0) {
            const haloR = rEff * (3 + flashK * 4);
            const halo = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, haloR);
            halo.addColorStop(0, `rgba(255,180,100,${0.6 * flashK})`);
            halo.addColorStop(0.5, `rgba(233,121,25,${0.22 * flashK})`);
            halo.addColorStop(1, 'rgba(233,121,25,0)');
            ctx.fillStyle = halo;
            ctx.beginPath();
            ctx.arc(p.x, p.y, haloR, 0, Math.PI * 2);
            ctx.fill();
          }

          // corpo
          const r = flashK > 0 ? 255 : (p.soma ? 180 : 220);
          const g = flashK > 0 ? 200 : (p.soma ? 210 : 230);
          const b = flashK > 0 ? 130 : 255;
          ctx.fillStyle = `rgba(${r},${g},${b},${p.soma ? 0.95 : 0.78})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, rEff, 0, Math.PI * 2);
          ctx.fill();
        }

        requestAnimationFrame(step);
      }

      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      window.addEventListener('mouseleave', () => {
        mouse.x = -1e6; mouse.y = -1e6;
      });

      resize();
      step();
    })();
  </script>
</body>
</html>
