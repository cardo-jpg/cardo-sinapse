<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinapse — Entrar</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-logo">
      <img src="/static/logo.png" alt="Cardô Marketing" class="home-logo">
      <div class="home-sinapse-name">Sinapse</div>
    </div>
    {% if request.query_params.get('error') %}
    <div class="error-msg">Senha incorreta. Tente novamente.</div>
    {% endif %}
    <form method="post" action="/login">
      <input type="text" name="username" placeholder="Seu usuário" autofocus required autocomplete="username">
      <input type="password" name="password" placeholder="Senha de acesso" required autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
