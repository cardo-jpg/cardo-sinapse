<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — Sinapse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a14;
    --panel: rgba(20,20,30,0.72);
    --border: #2a2a2a;
    --text: #eee;
    --muted: #888;
    --orange: #E97919;
    --orange-soft: #f59854;
    --navy: #19196C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(1200px 600px at -10% -20%, rgba(25,25,108,.35) 0%, transparent 60%),
      radial-gradient(900px 600px at 110% 110%, rgba(233,121,25,.16) 0%, transparent 60%),
      var(--bg);
  }
  .topbar {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 18px;
    padding: 14px 24px;
    background: rgba(14,14,26,0.72);
    backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid var(--border);
  }
  .title {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.01em;
  }
  .title em {
    font-style: italic;
    color: var(--orange-soft);
    font-weight: 500;
  }
  .selector {
    display: flex; gap: 6px;
    margin-left: auto;
  }
  .client-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    font-size: .82rem;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .client-btn:hover {
    background: rgba(233,121,25,0.08);
    color: var(--text);
    border-color: rgba(233,121,25,0.3);
  }
  .client-btn.active {
    background: rgba(233,121,25,0.14);
    color: var(--orange-soft);
    border-color: rgba(233,121,25,0.5);
  }
  .client-btn .sigla {
    font-size: .68rem;
    font-weight: 700;
    background: rgba(255,255,255,0.08);
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: .04em;
  }
  .client-btn.active .sigla {
    background: rgba(233,121,25,0.2);
  }
  .frame-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .frame-wrap iframe {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }
  .empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    color: var(--muted);
    font-size: .9rem;
    gap: 10px;
  }
  .empty-icon { font-size: 2.2rem; opacity: .4; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="title">Dashboard <em>de clientes</em></div>
    <div class="selector" id="selector">
      <!-- buttons rendered by JS -->
    </div>
  </div>
  <div class="frame-wrap">
    <iframe id="frame" src=""></iframe>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-icon">📊</div>
      <div>Selecione um cliente acima</div>
    </div>
  </div>

<script>
const CLIENTS = [
  { sigla: 'NF',  nome: 'Grupo NF',       url: '/dashboard/nf'  },
  { sigla: 'DFT', nome: 'DFT Logística',  url: '/dashboard/dft' },
];

const params = new URLSearchParams(location.search);
let current = params.get('c') || localStorage.getItem('cardo_dash_client') || CLIENTS[0].sigla;

function render() {
  const sel = document.getElementById('selector');
  sel.innerHTML = '';
  for (const c of CLIENTS) {
    const btn = document.createElement('button');
    btn.className = 'client-btn' + (c.sigla === current ? ' active' : '');
    btn.innerHTML = `<span class="sigla">${c.sigla}</span><span>${c.nome}</span>`;
    btn.onclick = () => { current = c.sigla; localStorage.setItem('cardo_dash_client', c.sigla); render(); load(); };
    sel.appendChild(btn);
  }
}
function load() {
  const c = CLIENTS.find(x => x.sigla === current);
  const frame = document.getElementById('frame');
  const empty = document.getElementById('empty');
  if (!c) { frame.src = ''; empty.style.display = 'flex'; return; }
  frame.src = c.url;
  empty.style.display = 'none';
  const url = new URL(location.href);
  url.searchParams.set('c', c.sigla);
  history.replaceState(null, '', url);
}
render();
load();
</script>
</body>
</html>
