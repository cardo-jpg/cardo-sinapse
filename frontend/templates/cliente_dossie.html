<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ cliente_nome }} — Sinapse</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { overflow: hidden; }
    .cd-shell { display: flex; height: 100vh; overflow: hidden; }
    .cd-main { flex: 1; overflow: auto; padding: 22px 26px 64px; background: var(--bg); }

    .cd-breadcrumb { font-size: .82rem; color: var(--muted); margin-bottom: 14px; }
    .cd-breadcrumb a { color: var(--muted); text-decoration: none; }
    .cd-breadcrumb a:hover { color: var(--accent); }
    .cd-back-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 7px; background: var(--surface);
      border: 1px solid var(--border); font-weight: 500;
      transition: border-color .15s, color .15s;
    }
    .cd-back-link:hover { border-color: var(--accent); }

    /* ── Header card ── */
    .cd-header {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 22px 26px; margin-bottom: 18px;
      display: grid; grid-template-columns: 72px 1fr auto; gap: 20px; align-items: center;
    }
    .cd-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: #2a1208; border: 2px solid var(--accent); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 700;
    }
    .cd-h-name { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .cd-h-sub { font-size: .82rem; color: var(--muted); margin-top: 4px; display: flex; gap: 14px; flex-wrap: wrap; }
    .cd-h-pill { display: inline-flex; align-items: center; gap: 5px; }
    .cd-h-pill strong { color: var(--text); font-weight: 500; }
    .cd-h-chips { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
    .cd-chip-mini { background: rgba(255, 77, 0, .12); color: #fb923c; padding: 3px 9px; border-radius: 999px; font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

    .cd-h-right { display: flex; gap: 14px; align-items: center; }
    .cd-eye-btn { background: none; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: .78rem; display: inline-flex; align-items: center; gap: 5px; padding: 6px 10px; border-radius: 7px; }
    .cd-eye-btn:hover { color: var(--text); border-color: var(--accent); }

    /* Inline edit */
    .cd-editable { cursor: pointer; position: relative; padding-right: 18px; display: inline-block; }
    .cd-editable:hover { color: var(--accent); }
    .cd-editable:hover::after { content: '✏️'; position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: .68rem; opacity: .6; }
    .cd-edit-input {
      background: #0f0f0f; border: 1px solid var(--accent); color: var(--text);
      padding: 4px 8px; border-radius: 6px; font-size: .85rem; width: 100%; font-family: inherit;
    }
    .cd-edit-input:focus { outline: none; }
    .cd-edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .cd-edit-btn { background: var(--accent); border: none; color: #fff; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: .75rem; }
    .cd-edit-btn-cancel { background: var(--surface); color: var(--muted); }

    .cd-contrato-status { display: inline-block; margin-left: 6px; padding: 1px 7px; border-radius: 6px; font-size: .66rem; font-weight: 600; }
    .cd-contrato-vigente { background: #052e16; color: #4ade80; }
    .cd-contrato-atencao { background: #2c1d05; color: #fbbf24; }
    .cd-contrato-expirado { background: #2c0608; color: #f87171; }

    /* Resumo do relacionamento */
    .cd-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .cd-stat {
      background: #0f0f0f; border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; border-left: 3px solid var(--accent);
    }
    .cd-stat-label { font-size: .66rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
    .cd-stat-val { font-size: 1.3rem; font-weight: 700; margin-top: 4px; line-height: 1.15; }
    .cd-stat-sub { font-size: .7rem; color: var(--muted); margin-top: 2px; }
    .cd-stat.accent-good { border-left-color: #4ade80; }
    .cd-stat.accent-warn { border-left-color: #fbbf24; }
    .cd-stat.accent-bad { border-left-color: #f87171; }

    /* Briefing Q&A */
    .cd-briefing-list { display: flex; flex-direction: column; gap: 14px; }
    .cd-briefing-item { border-left: 2px solid var(--border); padding-left: 14px; }
    .cd-briefing-q { font-size: .78rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .cd-briefing-a { font-size: .9rem; line-height: 1.55; }

    /* HTML render dos documents legados */
    .cd-html { padding: 0; background: transparent; border: none; min-height: 0; }
    .cd-html h1, .cd-html h2, .cd-html h3 { color: var(--text); margin-top: 16px; margin-bottom: 8px; }
    .cd-html h1 { font-size: 1.3rem; }
    .cd-html h2 { font-size: 1.1rem; }
    .cd-html h3 { font-size: 1rem; }
    .cd-html p { margin: 6px 0; }
    .cd-html ul, .cd-html ol { padding-left: 22px; margin: 8px 0; }
    .cd-html li { margin: 3px 0; }
    .cd-html strong { color: var(--text); }
    .cd-html a { color: var(--accent); }
    .cd-html blockquote { border-left: 3px solid var(--accent); padding: 4px 12px; color: var(--muted); margin: 8px 0; }
    .cd-html code { background: #0a0a0a; padding: 1px 5px; border-radius: 3px; font-size: .85em; }

    /* Ata preview expansível */
    .cd-ata-preview { padding: 14px 18px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 8px; margin: 8px 12px 14px; }
    .cd-ata-toggle { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .72rem; padding: 4px 8px; border-radius: 6px; }
    .cd-ata-toggle:hover { color: var(--accent); background: var(--surface); }

    /* Mais ações menu */
    .cd-more-menu {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 6px; margin-bottom: 14px; max-width: 480px; margin-left: auto;
    }
    .cd-more-item {
      width: 100%; text-align: left; background: none; border: none; color: var(--text);
      padding: 10px 12px; border-radius: 7px; cursor: pointer; font-size: .85rem; font-weight: 500;
    }
    .cd-more-item:hover { background: rgba(255, 77, 0, .08); }
    .cd-more-hint { font-size: .72rem; color: var(--muted); margin-top: 4px; font-weight: 400; }
    .cd-h-metric { text-align: center; padding: 0 8px; }
    .cd-h-metric-val { font-size: 1.45rem; font-weight: 700; line-height: 1; }
    .cd-h-metric-label { font-size: .64rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 4px; }
    .cd-h-metric.boa { color: #4ade80; }
    .cd-h-metric.media { color: #fbbf24; }
    .cd-h-metric.ruim { color: #f87171; }
    .cd-h-metric.neutra { color: var(--muted); }

    .cd-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 8px 14px; border-radius: 8px; font-size: .82rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; font-weight: 500;
      text-decoration: none;
    }
    .cd-btn:hover { border-color: var(--accent); }
    .cd-btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cd-btn-primary:hover { background: var(--accent-hover); }

    /* ── Quick actions ── */
    .cd-actions { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }

    /* ── Layout main + side ── */
    .cd-layout { display: grid; grid-template-columns: 1fr 320px; gap: 18px; align-items: start; }

    /* ── Tabs ── */
    .cd-tabs {
      display: flex; gap: 4px; background: transparent;
      border-bottom: 1px solid var(--border); margin-bottom: 14px; overflow-x: auto;
    }
    .cd-tab {
      background: transparent; border: none; color: var(--muted);
      padding: 10px 14px; font-size: .85rem; cursor: pointer;
      border-bottom: 2px solid transparent; transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .cd-tab:hover { color: var(--text); }
    .cd-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .cd-tab-count { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 1px 7px; font-size: .68rem; margin-left: 4px; color: var(--muted); }

    /* ── Card ── */
    .cd-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; }
    .cd-card + .cd-card { margin-top: 14px; }
    .cd-card-title { font-size: .95rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    .cd-empty { padding: 36px 16px; text-align: center; color: var(--muted); font-size: .85rem; }
    .cd-empty-strong { color: var(--text); font-weight: 600; display: block; margin-bottom: 4px; font-size: .95rem; }

    /* ── Info side ── */
    .cd-side-list { display: flex; flex-direction: column; gap: 12px; }
    .cd-side-item { display: flex; flex-direction: column; gap: 3px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .cd-side-item:last-child { border-bottom: none; padding-bottom: 0; }
    .cd-side-label { font-size: .66rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
    .cd-side-val { font-size: .85rem; color: var(--text); }
    .cd-side-val.muted { color: var(--muted); }

    /* ── Atas list ── */
    .cd-ata-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; transition: background .12s; }
    .cd-ata-row + .cd-ata-row { border-top: 1px solid var(--border); }
    .cd-ata-row:hover { background: rgba(255, 77, 0, .04); }
    .cd-ata-icon { font-size: 1rem; color: var(--muted); }
    .cd-ata-info { flex: 1; min-width: 0; }
    .cd-ata-title { font-size: .88rem; font-weight: 500; }
    .cd-ata-date { font-size: .7rem; color: var(--muted); }

    /* ── Pre/textarea views ── */
    .cd-prose {
      background: #0f0f0f; border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 16px; font-size: .85rem; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word; min-height: 80px;
    }
    .cd-prose:empty::before { content: 'Vazio'; color: var(--muted); font-style: italic; }

    .cd-arq-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .cd-arq {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: #0f0f0f; border: 1px solid var(--border); border-radius: 8px;
      text-decoration: none; color: inherit;
    }
    .cd-arq:hover { border-color: var(--accent); }
    .cd-arq-icon { font-size: 1.4rem; }
    .cd-arq-info { flex: 1; min-width: 0; }
    .cd-arq-name { font-weight: 500; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cd-arq-meta { font-size: .72rem; color: var(--muted); }
    .cd-arq-tipo { background: var(--surface); border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px; font-size: .68rem; color: var(--muted); }
  </style>
</head>
<body>
<div class="cd-shell" x-data="dossieApp({{ cliente_id }})" x-init="init()" x-cloak>
  {% include "_sidebar.html" %}

  <main class="cd-main">
    <div class="cd-breadcrumb">
      <a href="/clientes" class="cd-back-link">← Voltar para Clientes</a>
    </div>

    <template x-if="cliente">
      <div>
        <!-- ── Header ── -->
        <div class="cd-header">
          <div class="cd-avatar" x-text="cliente.sigla"></div>
          <div>
            <div class="cd-h-name" x-text="showValues ? cliente.razao_social : `[${cliente.sigla}]`"></div>
            <div class="cd-h-sub">
              <span class="cd-h-pill" x-show="showValues && cliente.nome_fantasia">
                <strong x-text="cliente.nome_fantasia"></strong>
              </span>
              <span class="cd-h-pill" x-show="cliente.account">
                👤 <span x-text="cliente.account"></span>
              </span>
              <span class="cd-h-pill" x-show="cliente.nicho">
                # <span x-text="cliente.nicho"></span>
              </span>
              <span class="cd-h-pill" x-show="cliente.entrada_em">
                📅 Desde <span x-text="fmtDate(cliente.entrada_em)"></span>
              </span>
              <span class="cd-h-pill" x-show="cliente.valor_mensal">
                💰 <strong x-text="showValues ? formatBRL(cliente.valor_mensal) : '••••••'"></strong>/mês
              </span>
            </div>
            <div class="cd-h-chips" x-show="(cliente.plataformas || []).length">
              <template x-for="p in cliente.plataformas" :key="p">
                <span class="cd-chip-mini" x-text="p"></span>
              </template>
            </div>
          </div>
          <div class="cd-h-right">
            <div class="cd-h-metric" :class="saudeColor(cliente.saude)">
              <div class="cd-h-metric-val" x-text="cliente.saude !== null && cliente.saude !== undefined ? cliente.saude : '—'"></div>
              <div class="cd-h-metric-label">Saúde</div>
            </div>
            <div class="cd-h-metric" :class="perfColor(cliente.performance)">
              <div class="cd-h-metric-val" style="font-size: 1rem; font-weight: 600;" x-text="cliente.performance || '—'"></div>
              <div class="cd-h-metric-label">Performance</div>
            </div>
            <button class="cd-eye-btn" @click="toggleVisibility()" :title="showValues ? 'Ocultar' : 'Mostrar'">
              <span x-text="showValues ? '🙈' : '👁'"></span>
            </button>
            <button class="cd-eye-btn" @click="showMore = !showMore" title="Mais ações">⋯</button>
            <a class="cd-btn" :href="`/clientes?edit=${cliente.id}`">✏️ Editar</a>
          </div>
        </div>

        <!-- ── Menu "Mais ações" ── -->
        <div x-show="showMore" @click.outside="showMore = false" class="cd-more-menu">
          <button class="cd-more-item" @click="arquivarDocumentacao(); showMore = false">
            🗄️ Arquivar histórico do espaço Documentação
            <div class="cd-more-hint">Move a árvore [{{ cliente_sigla }}] para "Arquivado". O dossiê continua mostrando tudo.</div>
          </button>
        </div>

        <!-- ── Tabs ── -->
        <div class="cd-tabs">
          <button class="cd-tab" :class="tab === 'overview' ? 'active' : ''" @click="tab = 'overview'">Visão Geral</button>
          <button class="cd-tab" :class="tab === 'reunioes' ? 'active' : ''" @click="tab = 'reunioes'">
            Reuniões <span class="cd-tab-count" x-text="(cliente.atas || []).length"></span>
          </button>
          <button class="cd-tab" :class="tab === 'documentos' ? 'active' : ''" @click="tab = 'documentos'">
            Documentos <span class="cd-tab-count" x-text="(cliente.arquivos || []).length"></span>
          </button>
          <button class="cd-tab" :class="tab === 'contrato' ? 'active' : ''" @click="tab = 'contrato'">Contrato</button>
          <button class="cd-tab" :class="tab === 'briefing' ? 'active' : ''" @click="tab = 'briefing'; loadBriefing()">Briefing</button>
          <button class="cd-tab" :class="tab === 'venda' ? 'active' : ''" @click="tab = 'venda'">Reunião de Venda</button>
          <button class="cd-tab" :class="tab === 'plano' ? 'active' : ''" @click="tab = 'plano'">Plano de Ação</button>
        </div>

        <div class="cd-layout">
          <div>
            <!-- ── Tab: Visão Geral ── -->
            <div x-show="tab === 'overview'">
              <div class="cd-card">
                <div class="cd-card-title">📊 Resumo do relacionamento</div>
                <div class="cd-stats">
                  <div class="cd-stat">
                    <div class="cd-stat-label">Tempo como cliente</div>
                    <div class="cd-stat-val" x-text="tempoComoClienteText"></div>
                    <div class="cd-stat-sub" x-show="cliente.entrada_em" x-text="`desde ${fmtDate(cliente.entrada_em)}`"></div>
                  </div>
                  <div class="cd-stat accent-good">
                    <div class="cd-stat-label">LTV estimado</div>
                    <div class="cd-stat-val" x-text="showValues ? formatBRL(cliente.metricas?.ltv_estimado || 0) : '••••••'"></div>
                    <div class="cd-stat-sub">valor mensal × meses ativos</div>
                  </div>
                  <div class="cd-stat" :class="proxVencColor">
                    <div class="cd-stat-label">Próximo vencimento</div>
                    <div class="cd-stat-val" x-text="proxVencText"></div>
                    <div class="cd-stat-sub" x-text="proxVencSub"></div>
                  </div>
                  <div class="cd-stat" :class="contratoColor">
                    <div class="cd-stat-label">Fim do contrato</div>
                    <div class="cd-stat-val" x-text="fimContratoText"></div>
                    <div class="cd-stat-sub" x-text="fimContratoSub"></div>
                  </div>
                </div>
              </div>

              <div class="cd-card">
                <div class="cd-card-title">📄 Sobre o cliente</div>
                <div class="cd-html cd-prose" x-html="cliente.ficha" x-show="cliente.ficha"></div>
                <div class="cd-prose" x-show="!cliente.ficha && cliente.observacoes" x-text="cliente.observacoes || ''"></div>
                <div class="cd-empty" x-show="!cliente.ficha && !cliente.observacoes">
                  Nenhuma informação cadastrada ainda. Edite o cliente pra adicionar observações ou conteúdo livre.
                </div>
              </div>
            </div>

            <!-- ── Tab: Reuniões ── -->
            <div x-show="tab === 'reunioes'">
              <div class="cd-card">
                <div class="cd-card-title">📅 Atas de reunião vinculadas</div>
                <template x-if="!(cliente.atas || []).length">
                  <div class="cd-empty">
                    <span class="cd-empty-strong">Nenhuma ata ainda</span>
                    As atas geradas pelo <a href="/ata" style="color: var(--accent);">Gerador de Atas</a> com a sigla <strong x-text="`[${cliente.sigla}]`"></strong> aparecem aqui automaticamente.
                  </div>
                </template>
                <template x-for="a in cliente.atas" :key="a.id">
                  <div>
                    <div class="cd-ata-row" style="cursor: pointer;" @click="toggleAtaPreview(a.id)">
                      <span class="cd-ata-icon" x-text="ataPreviews[a.id] ? '▼' : '▶'"></span>
                      <div class="cd-ata-info">
                        <div class="cd-ata-title" x-text="a.title"></div>
                        <div class="cd-ata-date" x-text="fmtDateTime(a.updated_at || a.created_at)"></div>
                      </div>
                    </div>
                    <div class="cd-ata-preview cd-html" x-show="ataPreviews[a.id]" x-html="ataPreviews[a.id]"></div>
                  </div>
                </template>
              </div>
            </div>

            <!-- ── Tab: Documentos ── -->
            <div x-show="tab === 'documentos'">
              <div class="cd-card">
                <div class="cd-card-title">
                  📎 Arquivos
                  <a class="cd-btn cd-btn-primary" :href="`/clientes?edit=${cliente.id}&tab=fin`" style="margin-left: auto; padding: 5px 10px; font-size: .75rem;">+ Upload</a>
                </div>
                <template x-if="!(cliente.arquivos || []).length">
                  <div class="cd-empty">
                    <span class="cd-empty-strong">Nenhum arquivo</span>
                    Faça upload pela tela de edição (aba Financeiro)
                  </div>
                </template>
                <div class="cd-arq-grid">
                  <template x-for="a in cliente.arquivos" :key="a.id">
                    <a class="cd-arq" :href="`/api/clientes/${cliente.id}/arquivos/${a.id}/download`" target="_blank">
                      <span class="cd-arq-icon" x-text="iconForType(a.mime_type)"></span>
                      <div class="cd-arq-info">
                        <div class="cd-arq-name" x-text="a.titulo || a.filename"></div>
                        <div class="cd-arq-meta">
                          <span x-text="formatSize(a.size_bytes)"></span> ·
                          <span x-text="fmtDate(a.uploaded_at)"></span>
                        </div>
                      </div>
                      <span class="cd-arq-tipo" x-text="a.tipo"></span>
                    </a>
                  </template>
                </div>
              </div>
            </div>

            <!-- ── Tab: Contrato ── -->
            <div x-show="tab === 'contrato'">
              <div class="cd-card">
                <div class="cd-card-title">📜 Contrato</div>
                <template x-if="!contratos.length">
                  <div class="cd-empty">
                    <span class="cd-empty-strong">Contrato não anexado</span>
                    Faça upload do contrato assinado pela tela de edição (aba Financeiro). Arquivos com "contrato" no nome são classificados automaticamente.
                  </div>
                </template>
                <div class="cd-arq-grid">
                  <template x-for="a in contratos" :key="a.id">
                    <a class="cd-arq" :href="`/api/clientes/${cliente.id}/arquivos/${a.id}/download`" target="_blank">
                      <span class="cd-arq-icon" x-text="iconForType(a.mime_type)"></span>
                      <div class="cd-arq-info">
                        <div class="cd-arq-name" x-text="a.titulo || a.filename"></div>
                        <div class="cd-arq-meta">
                          <span x-text="formatSize(a.size_bytes)"></span> ·
                          <span x-text="fmtDate(a.uploaded_at)"></span>
                        </div>
                      </div>
                      <span class="cd-arq-tipo">contrato</span>
                    </a>
                  </template>
                </div>
              </div>
            </div>

            <!-- ── Tab: Briefing ── -->
            <div x-show="tab === 'briefing'">
              <div class="cd-card">
                <div class="cd-card-title">📝 Briefing inicial</div>

                <!-- Briefing legado importado da Documentação -->
                <template x-if="cliente.briefing_legado">
                  <div class="cd-html cd-prose" x-html="cliente.briefing_legado"></div>
                </template>

                <!-- Sem legado: lógica do form público -->
                <template x-if="!cliente.briefing_legado && briefingLoading">
                  <div class="cd-empty">Carregando…</div>
                </template>

                <template x-if="!cliente.briefing_legado && !briefingLoading && !briefing">
                  <div>
                    <div class="cd-empty">
                      <span class="cd-empty-strong">Sem briefing vinculado a este cliente</span>
                      Vincule um briefing já recebido OU envie o link público pro cliente preencher.
                      <div style="margin-top: 14px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                        <button class="cd-btn" @click="loadBriefingsDisponiveis()" x-show="!showBriefingPicker">🔗 Vincular briefing existente</button>
                        <a class="cd-btn cd-btn-primary" href="/briefing" target="_blank">↗ Abrir form do briefing</a>
                        <button class="cd-btn" @click="copyBriefingLink()" x-text="briefingCopied ? '✓ Link copiado' : '📋 Copiar link'"></button>
                      </div>
                    </div>

                    <template x-if="showBriefingPicker">
                      <div class="cd-card" style="margin-top: 14px; background: #0f0f0f;">
                        <div class="cd-card-title">Selecione um briefing</div>
                        <template x-if="!briefingsDisponiveis.length">
                          <div class="cd-empty">Nenhum briefing recebido ainda.</div>
                        </template>
                        <template x-for="b in briefingsDisponiveis" :key="b.id">
                          <div class="cd-ata-row" style="cursor: pointer;" @click="linkBriefing(b.id)">
                            <span class="cd-ata-icon">📝</span>
                            <div class="cd-ata-info">
                              <div class="cd-ata-title">
                                <span x-text="b.empresa_nome || b.client_name || '(sem nome)'"></span>
                                <span x-show="b.cliente_id && b.cliente_id != cliente.id" style="color: #f87171; font-size: .68rem; margin-left: 6px;">⚠ já vinculado a outro</span>
                              </div>
                              <div class="cd-ata-date">
                                <span x-text="b.client_name"></span> · <span x-text="b.client_email || ''"></span>
                                · <span x-text="fmtDateTime(b.submitted_at)"></span>
                              </div>
                            </div>
                            <span style="font-size: .72rem; color: var(--accent);">vincular →</span>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>

                <template x-if="!cliente.briefing_legado && !briefingLoading && briefing">
                  <div>
                    <div style="font-size: .75rem; color: var(--muted); margin-bottom: 12px;">
                      Respondido por <strong x-text="briefing.client_name || '—'"></strong>
                      <span x-show="briefing.client_email">(<span x-text="briefing.client_email"></span>)</span>
                      em <span x-text="fmtDateTime(briefing.submitted_at)"></span>
                    </div>
                    <div class="cd-briefing-list">
                      <template x-for="qa in briefingPairs" :key="qa.key">
                        <div class="cd-briefing-item">
                          <div class="cd-briefing-q" x-text="qa.label"></div>
                          <div class="cd-briefing-a cd-prose" x-text="qa.value || '(em branco)'"></div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>


            <!-- ── Tab: Reunião de Venda ── -->
            <div x-show="tab === 'venda'">
              <div class="cd-card">
                <div class="cd-card-title">💼 Resumo da venda</div>
                <div class="cd-prose" x-text="cliente.reuniao_venda_resumo || ''"></div>
              </div>
              <div class="cd-card" x-show="cliente.reuniao_venda_transcricao">
                <div class="cd-card-title">📝 Transcrição</div>
                <div class="cd-prose" x-text="cliente.reuniao_venda_transcricao || ''"></div>
              </div>
            </div>

            <!-- ── Tab: Plano de Ação ── -->
            <div x-show="tab === 'plano'">
              <div class="cd-card">
                <div class="cd-card-title">🎯 Plano de ação</div>
                <div class="cd-prose" x-text="cliente.plano_acao || ''"></div>
              </div>
            </div>
          </div>

          <!-- ── Side info ── -->
          <div class="cd-card" style="position: sticky; top: 0;">
            <div class="cd-card-title">Informações</div>
            <div class="cd-side-list">

              <!-- Status (ativo/inativo) — editável via select -->
              <div class="cd-side-item">
                <div class="cd-side-label">Status</div>
                <template x-if="editingField !== 'ativo'">
                  <div class="cd-side-val cd-editable" @click="startEdit('ativo', cliente.ativo)">
                    <span x-text="cliente.ativo ? '🟢 Ativo' : '⚫ Inativo'"></span>
                    <span x-show="cliente.inadimplente" style="color: #f87171; margin-left: 6px;">⚠ Inadimplente</span>
                  </div>
                </template>
                <template x-if="editingField === 'ativo'">
                  <div>
                    <select class="cd-edit-input" x-model="editValue" x-init="$nextTick(() => $el.focus())" @keydown.escape="cancelEdit()">
                      <option :value="true">🟢 Ativo</option>
                      <option :value="false">⚫ Inativo</option>
                    </select>
                    <div class="cd-edit-actions">
                      <button class="cd-edit-btn" @click="saveEdit()">Salvar</button>
                      <button class="cd-edit-btn cd-edit-btn-cancel" @click="cancelEdit()">Cancelar</button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Inadimplente -->
              <div class="cd-side-item">
                <div class="cd-side-label">Inadimplente</div>
                <template x-if="editingField !== 'inadimplente'">
                  <div class="cd-side-val cd-editable" @click="startEdit('inadimplente', cliente.inadimplente)" x-text="cliente.inadimplente ? '⚠ Sim' : 'Não'"></div>
                </template>
                <template x-if="editingField === 'inadimplente'">
                  <div>
                    <select class="cd-edit-input" x-model="editValue" x-init="$nextTick(() => $el.focus())" @keydown.escape="cancelEdit()">
                      <option :value="false">Não</option>
                      <option :value="true">Sim</option>
                    </select>
                    <div class="cd-edit-actions">
                      <button class="cd-edit-btn" @click="saveEdit()">Salvar</button>
                      <button class="cd-edit-btn cd-edit-btn-cancel" @click="cancelEdit()">Cancelar</button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Vencimento -->
              <div class="cd-side-item">
                <div class="cd-side-label">Vencimento</div>
                <template x-if="editingField !== 'vencimento_dia'">
                  <div class="cd-side-val cd-editable" :class="!cliente.vencimento_dia ? 'muted' : ''"
                       @click="startEdit('vencimento_dia', cliente.vencimento_dia)"
                       x-text="cliente.vencimento_dia ? `Dia ${cliente.vencimento_dia}` : 'Definir vencimento'"></div>
                </template>
                <template x-if="editingField === 'vencimento_dia'">
                  <div>
                    <input type="number" min="1" max="31" class="cd-edit-input" x-model.number="editValue" @keydown.enter="saveEdit()" @keydown.escape="cancelEdit()" x-init="$nextTick(() => $el.focus())">
                    <div class="cd-edit-actions">
                      <button class="cd-edit-btn" @click="saveEdit()">Salvar</button>
                      <button class="cd-edit-btn cd-edit-btn-cancel" @click="cancelEdit()">Cancelar</button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Verba de mídia -->
              <div class="cd-side-item">
                <div class="cd-side-label">Verba de mídia</div>
                <template x-if="editingField !== 'verba_midia'">
                  <div class="cd-side-val cd-editable" :class="!cliente.verba_midia ? 'muted' : ''"
                       @click="startEdit('verba_midia', cliente.verba_midia)"
                       x-text="cliente.verba_midia ? (showValues ? formatBRL(cliente.verba_midia) : '••••••') : 'Definir verba'"></div>
                </template>
                <template x-if="editingField === 'verba_midia'">
                  <div>
                    <input type="number" step="0.01" class="cd-edit-input" x-model.number="editValue" @keydown.enter="saveEdit()" @keydown.escape="cancelEdit()" x-init="$nextTick(() => $el.focus())">
                    <div class="cd-edit-actions">
                      <button class="cd-edit-btn" @click="saveEdit()">Salvar</button>
                      <button class="cd-edit-btn cd-edit-btn-cancel" @click="cancelEdit()">Cancelar</button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Forma de pagamento -->
              <div class="cd-side-item">
                <div class="cd-side-label">Forma de pagamento</div>
                <template x-if="editingField !== 'forma_pagamento'">
                  <div class="cd-side-val cd-editable" :class="!cliente.forma_pagamento ? 'muted' : ''"
                       @click="startEdit('forma_pagamento', cliente.forma_pagamento)"
                       x-text="cliente.forma_pagamento || 'Definir'"></div>
                </template>
                <template x-if="editingField === 'forma_pagamento'">
                  <div>
                    <input type="text" class="cd-edit-input" x-model="editValue" placeholder="Boleto / Cartão / PIX" @keydown.enter="saveEdit()" @keydown.escape="cancelEdit()" x-init="$nextTick(() => $el.focus())">
                    <div class="cd-edit-actions">
                      <button class="cd-edit-btn" @click="saveEdit()">Salvar</button>
                      <button class="cd-edit-btn cd-edit-btn-cancel" @click="cancelEdit()">Cancelar</button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Plataformas (read-only — usa modal completo) -->
              <div class="cd-side-item" x-show="(cliente.plataformas || []).length">
                <div class="cd-side-label">Plataformas</div>
                <div class="cd-side-val" x-text="(cliente.plataformas || []).join(', ')"></div>
              </div>

              <!-- Canais ativos (read-only) -->
              <div class="cd-side-item" x-show="(cliente.canais_ativos || []).length">
                <div class="cd-side-label">Canais ativos</div>
                <div class="cd-side-val" style="display: flex; flex-wrap: wrap; gap: 4px;">
                  <template x-for="c in cliente.canais_ativos" :key="c">
                    <span class="cd-chip-mini" x-text="c"></span>
                  </template>
                </div>
              </div>

              <!-- Status do contrato -->
              <div class="cd-side-item">
                <div class="cd-side-label">Status do contrato</div>
                <template x-if="editingField !== 'status_contrato'">
                  <div class="cd-side-val cd-editable" :class="!cliente.status_contrato ? 'muted' : ''"
                       @click="startEdit('status_contrato', cliente.status_contrato)"
                       x-text="cliente.status_contrato || 'Definir'"></div>
                </template>
                <template x-if="editingField === 'status_contrato'">
                  <div>
                    <input type="text" class="cd-edit-input" x-model="editValue" placeholder="Vigente / Em renovação" @keydown.enter="saveEdit()" @keydown.escape="cancelEdit()" x-init="$nextTick(() => $el.focus())">
                    <div class="cd-edit-actions">
                      <button class="cd-edit-btn" @click="saveEdit()">Salvar</button>
                      <button class="cd-edit-btn cd-edit-btn-cancel" @click="cancelEdit()">Cancelar</button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Entrada -->
              <div class="cd-side-item">
                <div class="cd-side-label">Entrada</div>
                <template x-if="editingField !== 'entrada_em'">
                  <div class="cd-side-val cd-editable" :class="!cliente.entrada_em ? 'muted' : ''"
                       @click="startEdit('entrada_em', cliente.entrada_em)"
                       x-text="cliente.entrada_em ? fmtDate(cliente.entrada_em) : 'Definir data'"></div>
                </template>
                <template x-if="editingField === 'entrada_em'">
                  <div>
                    <input type="date" class="cd-edit-input" x-model="editValue" @keydown.enter="saveEdit()" @keydown.escape="cancelEdit()" x-init="$nextTick(() => $el.focus())">
                    <div class="cd-edit-actions">
                      <button class="cd-edit-btn" @click="saveEdit()">Salvar</button>
                      <button class="cd-edit-btn cd-edit-btn-cancel" @click="cancelEdit()">Cancelar</button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Data final do contrato -->
              <div class="cd-side-item">
                <div class="cd-side-label">Fim do contrato</div>
                <template x-if="editingField !== 'data_final_contrato'">
                  <div class="cd-side-val cd-editable" :class="!cliente.data_final_contrato ? 'muted' : ''"
                       @click="startEdit('data_final_contrato', cliente.data_final_contrato)">
                    <span x-text="cliente.data_final_contrato ? fmtDate(cliente.data_final_contrato) : 'Sem prazo'"></span>
                    <span x-show="cliente.data_final_contrato && cliente.metricas?.dias_ate_fim_contrato !== null" class="cd-contrato-status" :class="contratoStatusClass" x-text="contratoStatusLabel"></span>
                  </div>
                </template>
                <template x-if="editingField === 'data_final_contrato'">
                  <div>
                    <input type="date" class="cd-edit-input" x-model="editValue" @keydown.enter="saveEdit()" @keydown.escape="cancelEdit()" x-init="$nextTick(() => $el.focus())">
                    <div class="cd-edit-actions">
                      <button class="cd-edit-btn" @click="saveEdit()">Salvar</button>
                      <button class="cd-edit-btn cd-edit-btn-cancel" @click="cancelEdit()">Cancelar</button>
                    </div>
                  </div>
                </template>
              </div>

              <div class="cd-side-item">
                <div class="cd-side-label">Reuniões</div>
                <div class="cd-side-val" x-text="(cliente.atas || []).length"></div>
              </div>
              <div class="cd-side-item">
                <div class="cd-side-label">Última reunião</div>
                <div class="cd-side-val" :class="!ultimaReuniao ? 'muted' : ''" x-text="ultimaReuniao ? fmtDate(ultimaReuniao) : '—'"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <template x-if="!cliente && !loading">
      <div class="cd-empty">Cliente não encontrado. <a href="/clientes" style="color: var(--accent);">← Voltar para Clientes</a></div>
    </template>
  </main>
</div>

<script>
function dossieApp(clienteId) {
  return {
    clienteId,
    cliente: null,
    loading: true,
    tab: 'overview',
    showValues: localStorage.getItem('sinapse_show_values') !== 'false',
    editingField: null,
    editValue: '',
    showMore: false,

    briefing: null,
    briefingDefinition: null,
    briefingLoading: false,
    briefingLoaded: false,
    briefingCopied: false,
    showBriefingPicker: false,
    briefingsDisponiveis: [],

    ataPreviews: {},  // doc_id → content HTML

    get contratos() {
      return (this.cliente?.arquivos || []).filter(a => a.tipo === 'contrato');
    },

    get ultimaReuniao() {
      const atas = this.cliente?.atas || [];
      if (!atas.length) return null;
      return atas[0].updated_at || atas[0].created_at;
    },

    // ── Resumo do relacionamento ─────────────────────────────────────
    get tempoComoClienteText() {
      const m = this.cliente?.metricas;
      if (!m || !this.cliente?.entrada_em) return '—';
      const meses = m.meses_como_cliente || 0;
      if (meses === 0) {
        const dias = m.dias_como_cliente || 0;
        return dias === 0 ? 'Hoje' : (dias === 1 ? '1 dia' : `${dias} dias`);
      }
      if (meses < 12) return meses === 1 ? '1 mês' : `${meses} meses`;
      const anos = Math.floor(meses / 12);
      const restMeses = meses % 12;
      return restMeses ? `${anos}a ${restMeses}m` : (anos === 1 ? '1 ano' : `${anos} anos`);
    },

    get proxVencText() {
      const d = this.cliente?.metricas?.dias_ate_vencimento;
      if (d === null || d === undefined) return '—';
      if (d === 0) return 'Hoje';
      if (d === 1) return 'Amanhã';
      return `${d} dias`;
    },
    get proxVencSub() {
      const venc = this.cliente?.vencimento_dia;
      return venc ? `Dia ${venc} do mês` : 'Vencimento não definido';
    },
    get proxVencColor() {
      const d = this.cliente?.metricas?.dias_ate_vencimento;
      if (d === null || d === undefined) return '';
      if (d <= 3) return 'accent-warn';
      return '';
    },

    get fimContratoText() {
      const d = this.cliente?.metricas?.dias_ate_fim_contrato;
      if (d === null || d === undefined) return 'Sem prazo';
      if (d < 0) return 'Expirado';
      if (d === 0) return 'Hoje';
      if (d === 1) return 'Amanhã';
      if (d < 60) return `${d} dias`;
      const meses = Math.round(d / 30);
      return `~${meses} meses`;
    },
    get fimContratoSub() {
      if (!this.cliente?.data_final_contrato) return 'Defina uma data para acompanhar';
      const d = this.cliente?.metricas?.dias_ate_fim_contrato;
      if (d < 0) return `Expirou em ${this.fmtDate(this.cliente.data_final_contrato)}`;
      return `Em ${this.fmtDate(this.cliente.data_final_contrato)}`;
    },
    get contratoColor() {
      const d = this.cliente?.metricas?.dias_ate_fim_contrato;
      if (d === null || d === undefined) return '';
      if (d < 0) return 'accent-bad';
      if (d <= 30) return 'accent-warn';
      return 'accent-good';
    },
    get contratoStatusLabel() {
      const d = this.cliente?.metricas?.dias_ate_fim_contrato;
      if (d === null || d === undefined) return '';
      if (d < 0) return 'Expirado';
      if (d <= 30) return `${d} dias`;
      return '';
    },
    get contratoStatusClass() {
      const d = this.cliente?.metricas?.dias_ate_fim_contrato;
      if (d === null || d === undefined) return '';
      if (d < 0) return 'cd-contrato-expirado';
      if (d <= 30) return 'cd-contrato-atencao';
      return 'cd-contrato-vigente';
    },

    async init() {
      try {
        const r = await fetch(`/api/clientes/${this.clienteId}/dossie`);
        if (r.ok) this.cliente = await r.json();
      } catch (e) { console.error(e); }
      // ?tab=… deep-link (vindo do gerador de atas, por exemplo)
      const params = new URLSearchParams(window.location.search);
      const initialTab = params.get('tab');
      const validTabs = ['overview', 'reunioes', 'documentos', 'contrato', 'briefing', 'venda', 'plano'];
      if (initialTab && validTabs.includes(initialTab)) {
        this.tab = initialTab;
        if (initialTab === 'briefing') this.loadBriefing();
      }
      this.loading = false;
    },

    get briefingPairs() {
      if (!this.briefing || !this.briefing.responses) return [];
      const def = this.briefingDefinition || {};
      const fields = (def.fields || def.steps?.flatMap(s => s.fields) || []);
      const responses = this.briefing.responses;
      const labelMap = {};
      for (const f of fields) {
        if (f && f.id) labelMap[f.id] = f.label || f.id;
      }
      return Object.entries(responses).map(([key, value]) => ({
        key,
        label: labelMap[key] || this._humanizeKey(key),
        value: this._stringify(value),
      }));
    },

    _humanizeKey(k) {
      return String(k || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    },
    _stringify(v) {
      if (v === null || v === undefined) return '';
      if (Array.isArray(v)) return v.join(', ');
      if (typeof v === 'object') return JSON.stringify(v, null, 2);
      return String(v);
    },

    async loadBriefing() {
      if (this.briefingLoaded) return;
      this.briefingLoading = true;
      try {
        const r = await fetch(`/api/clientes/${this.clienteId}/briefing`);
        if (r.ok) {
          const d = await r.json();
          this.briefing = d.briefing;
          this.briefingDefinition = d.definition;
        }
      } catch (e) { console.error(e); }
      this.briefingLoaded = true;
      this.briefingLoading = false;
    },

    async toggleAtaPreview(docId) {
      if (this.ataPreviews[docId]) {
        delete this.ataPreviews[docId];
        this.ataPreviews = { ...this.ataPreviews };
        return;
      }
      try {
        const r = await fetch(`/api/clientes/${this.clienteId}/documents/${docId}`);
        if (r.ok) {
          const d = await r.json();
          this.ataPreviews[docId] = d.content || '<em>(vazio)</em>';
          this.ataPreviews = { ...this.ataPreviews };
        }
      } catch (e) { console.error(e); }
    },

    async loadBriefingsDisponiveis() {
      this.showBriefingPicker = true;
      try {
        const r = await fetch('/api/briefings/disponiveis');
        if (r.ok) {
          const d = await r.json();
          this.briefingsDisponiveis = d.briefings || [];
        }
      } catch (e) { console.error(e); }
    },

    async linkBriefing(responseId) {
      try {
        const r = await fetch(`/api/clientes/${this.clienteId}/briefing/link/${responseId}`, { method: 'POST' });
        if (!r.ok) { alert('Falha ao vincular'); return; }
        // Recarrega o briefing
        this.briefingLoaded = false;
        this.showBriefingPicker = false;
        await this.loadBriefing();
      } catch (e) {
        console.error(e);
        alert('Erro de rede');
      }
    },

    async copyBriefingLink() {
      try {
        await navigator.clipboard.writeText(`${window.location.origin}/briefing`);
        this.briefingCopied = true;
        setTimeout(() => { this.briefingCopied = false; }, 2000);
      } catch (e) { alert('Não foi possível copiar.'); }
    },

    async arquivarDocumentacao() {
      const msg = `Arquivar a árvore [${this.cliente.sigla}] do espaço Documentação?\n\n` +
                  `• O conteúdo continua acessível pelo dossiê\n` +
                  `• A árvore some da visualização do espaço Documentação\n` +
                  `• Pode ser revertido manualmente movendo de volta`;
      if (!confirm(msg)) return;
      try {
        const r = await fetch(`/api/clientes/${this.clienteId}/arquivar-documentacao`, { method: 'POST' });
        if (!r.ok) { alert('Falha ao arquivar'); return; }
        const d = await r.json();
        alert(`Arquivado: ${d.archived} documento(s) movidos para "[ARQUIVADO] Documentação legada".`);
      } catch (e) {
        console.error(e);
        alert('Erro de rede');
      }
    },

    toggleVisibility() {
      this.showValues = !this.showValues;
      localStorage.setItem('sinapse_show_values', this.showValues ? 'true' : 'false');
    },

    startEdit(field, currentValue) {
      this.editingField = field;
      // Normaliza data para YYYY-MM-DD que <input type=date> espera
      if (field === 'entrada_em' && currentValue) {
        this.editValue = String(currentValue).slice(0, 10);
      } else {
        this.editValue = currentValue || '';
      }
    },

    cancelEdit() {
      this.editingField = null;
      this.editValue = '';
    },

    async saveEdit() {
      if (!this.editingField) return;
      const field = this.editingField;
      let value = this.editValue;

      // Normalização por tipo de campo
      const boolFields = ['ativo', 'inadimplente'];
      const numFields = ['vencimento_dia', 'verba_midia', 'valor_mensal', 'saude'];
      if (boolFields.includes(field)) {
        // <select> mantém o tipo do :value, mas se vier string, converte
        value = (value === true || value === 'true');
      } else if (numFields.includes(field)) {
        value = value === '' || value === null ? null : Number(value);
      } else if (typeof value === 'string') {
        value = value.trim() || null;
      }

      try {
        const r = await fetch(`/api/clientes/${this.clienteId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ [field]: value }),
        });
        if (!r.ok) { alert('Falha ao salvar'); return; }
        const d = await r.json();
        // Atualiza o campo editado E recalcula métricas se afetar
        if (d.cliente && d.cliente[field] !== undefined) {
          this.cliente[field] = d.cliente[field];
        }
        // Recarrega o dossiê pra atualizar métricas calculadas (ltv, dias, etc)
        if (['entrada_em', 'valor_mensal', 'vencimento_dia', 'data_final_contrato'].includes(field)) {
          const dr = await fetch(`/api/clientes/${this.clienteId}/dossie`);
          if (dr.ok) {
            const fresh = await dr.json();
            this.cliente.metricas = fresh.metricas;
          }
        }
      } catch (e) {
        console.error(e);
        alert('Erro de rede');
      }
      this.editingField = null;
      this.editValue = '';
    },

    formatBRL(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0); },
    formatSize(b) {
      if (!b) return '0 B';
      const u = ['B', 'KB', 'MB']; let i = 0; let n = b;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(n < 10 && i > 0 ? 1 : 0)} ${u[i]}`;
    },
    fmtDate(iso) {
      if (!iso) return '';
      // Parse manual de YYYY-MM-DD pra evitar timezone shift
      // (new Date('2025-11-01') vira 31/10 em UTC-3)
      const s = String(iso).slice(0, 10);
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[3]}/${m[2]}/${m[1]}`;
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR');
    },
    fmtDateTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
    },

    iconForType(mt) {
      if (!mt) return '📎';
      if (mt.startsWith('image/')) return '🖼️';
      if (mt.includes('pdf')) return '📕';
      if (mt.includes('word')) return '📘';
      return '📄';
    },

    saudeColor(s) {
      if (s === null || s === undefined) return 'neutra';
      if (s >= 75) return 'boa';
      if (s >= 50) return 'media';
      return 'ruim';
    },

    perfColor(p) {
      const v = (p || '').toLowerCase();
      if (v === 'ótimo' || v === 'otimo') return 'boa';
      if (v === 'bom') return 'boa';
      if (v === 'médio' || v === 'medio') return 'media';
      if (v === 'ruim') return 'ruim';
      return 'neutra';
    },
  };
}
</script>
