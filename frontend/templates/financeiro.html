  <!-- ══════════════════════════════════════════════════════════════════════════════
       MODAL — CLIENTE / FORNECEDOR
  ══════════════════════════════════════════════════════════════════════════════ -->
  <template x-if="contactModal">
    <div class="modal-backdrop" @click.self="contactModal=false">
      <div class="modal modal-lg">
        <div class="modal-header">
          <span class="modal-title" x-text="(contactForm.id ? 'Editar ' : 'Novo ') + (contactKind==='cliente' ? 'Cliente' : contactKind==='fornecedor' ? 'Fornecedor' : 'Colaborador')"></span>
          <button class="modal-close" @click="contactModal=false">&#10005;</button>
        </div>
        <div class="modal-body">

          <!-- empresa/pessoa toggle (hidden for colaboradores) -->
          <template x-if="contactKind !== 'colaborador'">
            <div class="form-row">
              <div class="form-group full">
                <div class="form-label">Tipo</div>
                <div class="toggle-group">
                  <button class="toggle-btn" :class="contactForm.tipo_pessoa==='empresa' && 'active-accent'" @click="contactForm.tipo_pessoa='empresa'">Empresa</button>
                  <button class="toggle-btn" :class="contactForm.tipo_pessoa==='pessoa' && 'active-accent'" @click="contactForm.tipo_pessoa='pessoa'">Pessoa Física</button>
                </div>
              </div>
            </div>
          </template>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" x-text="contactKind==='colaborador' ? 'Nome' : 'Nome Fantasia'"></label>
              <input class="form-input" type="text" x-model="contactForm.nome_fantasia" placeholder="Nome completo">
            </div>
            <template x-if="contactKind==='colaborador'">
              <div class="form-group">
                <label class="form-label">Cargo</label>
                <input class="form-input" type="text" x-model="contactForm.cargo" placeholder="Ex: Desenvolvedor, Designer...">
              </div>
            </template>
            <template x-if="contactForm.tipo_pessoa==='empresa'">
              <div class="form-group">
                <label class="form-label">Razão Social</label>
                <input class="form-input" type="text" x-model="contactForm.razao_social" placeholder="Razão social">
              </div>
            </template>
          </div>

          <div class="form-row">
            <template x-if="contactForm.tipo_pessoa==='empresa'">
              <div class="form-group">
                <label class="form-label">CNPJ</label>
                <input class="form-input" type="text" x-model="contactForm.cnpj" placeholder="00.000.000/0000-00">
              </div>
            </template>
            <template x-if="contactForm.tipo_pessoa==='pessoa'">
              <div class="form-group">
                <label class="form-label">CPF</label>
                <input class="form-input" type="text" x-model="contactForm.cpf" placeholder="000.000.000-00">
              </div>
            </template>
            <template x-if="contactForm.tipo_pessoa==='empresa'">
              <div class="form-group">
                <label class="form-label">IE</label>
                <input class="form-input" type="text" x-model="contactForm.ie" placeholder="Inscrição Estadual">
              </div>
            </template>
          </div>

          <template x-if="contactForm.tipo_pessoa==='empresa'">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">IM</label>
                <input class="form-input" type="text" x-model="contactForm.im" placeholder="Inscrição Municipal">
              </div>
              <div class="form-group"></div>
            </div>
          </template>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">E-mail</label>
              <input class="form-input" type="email" x-model="contactForm.email" placeholder="email@exemplo.com">
            </div>
            <div class="form-group">
              <label class="form-label">Telefone</label>
              <input class="form-input" type="text" x-model="contactForm.telefone" placeholder="(00) 00000-0000">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label class="form-label">Endereço</label>
              <input class="form-input" type="text" x-model="contactForm.endereco" placeholder="Rua, número, bairro, cidade - UF">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Situação</label>
              <div class="toggle-group">
                <button class="toggle-btn" :class="contactForm.situacao==='ativo' && 'active-green'" @click="contactForm.situacao='ativo'">Ativo</button>
                <button class="toggle-btn" :class="contactForm.situacao==='inativo' && 'active-accent'" @click="contactForm.situacao='inativo'">Inativo</button>
              </div>
            </div>
          </div>

        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" @click="contactModal=false">Cancelar</button>
          <button class="btn btn-accent" @click="saveContact()" :disabled="saving">
            <span x-text="saving ? 'Salvando...' : 'Salvar'"></span>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- toast -->
  <div class="fin-toast" :class="toast.type==='success'?'toast-success':'toast-error'" x-show="toast.show" x-transition x-text="toast.msg" style="display:none;"></div>

</div>

<script>
window.finApp = function() {
  return {
    /* ── state ── */
    currentSection: 'lancamentos',
    loading: false,
    saving: false,
    filtro: 'todos',
    fluxo: [],
    fluxoAno: new Date().getFullYear(),
    fluxoLoading: false,

    /* ── month ── */
    currentMes: (function() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    })(),

    /* ── data ── */
    lancamentos: [],
    transferencias: [],

    summary: {},
    bottomTotals: {},
    contas: [],
    categorias: [],
    centros: [],
    clientes: [],
    fornecedores: [],
    selectedIds: [],

    /* ── search ── */
    clienteQ: '',
    fornecedorQ: '',
    colaboradorQ: '',
    colaboradores: [],

    /* ── modals ── */
    lancModal: false,
    transfModal: false,
    contaModal: false,
    catModal: false,
    centroModal: false,
    contactModal: false,
    contactKind: 'cliente',

    /* ── forms ── */
    lancForm: {},
    transfForm: {},
    contaForm: {},
    catForm: {},
    centroForm: {},
    contactForm: {},

    /* ── toast ── */
    toast: { show: false, msg: '', type: 'success' },

    /* ── análise ── */
    dashData: null,
    dashLoading: false,
    _dashCharts: {},
    dashDe: (() => { const n = new Date(); const q = Math.floor(n.getMonth()/3); return `${n.getFullYear()}-${String(q*3+1).padStart(2,'0')}`; })(),
    dashAte: (() => { const n = new Date(); const q = Math.floor(n.getMonth()/3); return `${n.getFullYear()}-${String(q*3+3).padStart(2,'0')}`; })(),
    dashAllMonths: [],

    /* ── faturas cartão ── */
    cartaoData: null,
    cartaoLoading: false,
    _cartaoCharts: {},
    cartaoDe: '',
    cartaoAte: '',

    /* ── month picker ── */
    mp: { open: false, target: null, step: 0, since: null, until: null, viewYear: 2025 },
    mpMonthLabels: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],

    /* ── importar ── */
    impStep: 'upload',
    impDragOver: false,
    impFileName: '',
    impContaId: '',
    impId: null,
    impItens: [],
    importacoes: [],

    /* ══════════════════════════ COMPUTED ══════════════════════════ */

    get dashPeriodLabel() {
      const s = this.dashData?.siga_mensal || [];
      if (!s.length) return '—';
      const de  = this.dashDe  ? this.mpFmtLabel(this.dashDe)  : (s[0]?.mes || '');
      const ate = this.dashAte ? this.mpFmtLabel(this.dashAte) : (s[s.length-1]?.mes || '');
      return de === ate ? de : `${de} – ${ate}`;
    },

    get dashKpis() {
      if (!this.dashData) return { fat25:0, luc25:0, desp25:0, avgMargem25:0, bestMes:null };
      const siga = this.dashData.siga_mensal || [];
      const sum = (arr, k) => arr.reduce((s, h) => s + (h[k] || 0), 0);
      const fat25 = sum(siga, 'receber');
      const desp25 = sum(siga, 'pagar');
      const luc25 = sum(siga, 'lucro');
      const margens = siga.filter(s => s.receber > 0).map(s => s.lucro / s.receber * 100);
      const avgMargem25 = margens.length ? margens.reduce((a,b) => a+b, 0) / margens.length : 0;
      const bestMes = siga.length ? [...siga].sort((a, b) => b.lucro - a.lucro)[0] : null;
      return { fat25, luc25, desp25, avgMargem25, bestMes };
    },

    get mesLabel() {
      const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                     'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      const [y, m] = this.currentMes.split('-');
      return meses[parseInt(m) - 1] + ' de ' + y;
    },

    get filteredLancamentos() {
      if (this.filtro === 'todos') return this.lancamentos;
      if (this.filtro === 'a_receber') return this.lancamentos.filter(l => l.tipo === 'receber' && l.situacao !== 'quitado');
      if (this.filtro === 'a_pagar') return this.lancamentos.filter(l => l.tipo === 'pagar' && l.situacao !== 'quitado');
      if (this.filtro === 'em_aberto') return this.lancamentos.filter(l => l.situacao !== 'quitado');
      if (this.filtro === 'recebidos') return this.lancamentos.filter(l => l.tipo === 'receber' && l.situacao === 'quitado');
      if (this.filtro === 'pagos') return this.lancamentos.filter(l => l.tipo === 'pagar' && l.situacao === 'quitado');
      if (this.filtro === 'atrasados') {
        const today = new Date().toISOString().slice(0, 10);
        return this.lancamentos.filter(l => l.situacao !== 'quitado' && l.vencimento < today);
      }
      return this.lancamentos;
    },

    /* ══════════════════════════ HELPERS ══════════════════════════ */
    formatBRL(value) {
      const num = parseFloat(value) || 0;
      return 'R$ ' + Math.abs(num).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    parseBRL(str) {
      if (!str) return 0;
      return parseFloat(String(str).replace(/\./g, '').replace(',', '.')) || 0;
    },

    fmtDate(str) {
      if (!str) return '—';
      const [y, m, d] = str.slice(0, 10).split('-');
      return d + '/' + m + '/' + y;
    },

    today() {
      return new Date().toISOString().slice(0, 10);
    },

    filtroLabel(f) {
      return { todos: 'Todos', a_receber: 'A receber', a_pagar: 'A pagar', atrasados: 'Atrasados' }[f];
    },

    showToast(msg, type = 'success') {
      this.toast = { show: true, msg, type };
      setTimeout(() => { this.toast.show = false; }, 3200);
    },

    async api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || 'Erro desconhecido');
      }
      return res.status === 204 ? null : res.json();
    },

    /* ══════════════════════════ INIT ══════════════════════════ */
    async init() {
      await Promise.all([
        this.loadLancamentos(),
        this.loadContas(),
        this.loadCategorias(),
        this.loadCentros(),
        this.loadClientes(),
        this.loadFornecedores(),
      ]);
    },

    /* ══════════════════════════ MONTH NAV ══════════════════════════ */
    prevMes() {
      const [y, m] = this.currentMes.split('-').map(Number);
      const d = new Date(y, m - 2, 1);
      this.currentMes = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      this.loadLancamentos();
      if (this.currentSection === 'transferencias') this.loadTransferencias();
    },

    nextMes() {
      const [y, m] = this.currentMes.split('-').map(Number);
      const d = new Date(y, m, 1);
      this.currentMes = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      this.loadLancamentos();
      if (this.currentSection === 'transferencias') this.loadTransferencias();
    },

    /* ══════════════════════════ LANÇAMENTOS ══════════════════════════ */
    async loadLancamentos() {
      this.loading = true;
      try {
        const data = await this.api('GET', `/api/fin/lancamentos?mes=${this.currentMes}`);
        this.lancamentos = data.lancamentos || [];
        this.summary = data.summary || {};
        this.bottomTotals = data.bottom_totals || {};
      } catch(e) { this.showToast(e.message, 'error'); }
      finally { this.loading = false; }
    },

    toggleAll(e) {
      if (e.target.checked) {
        this.selectedIds = this.filteredLancamentos.map(l => l.id);
      } else {
        this.selectedIds = [];
      }
    },

    openLancModal(tipo = 'receber') {
      this.lancForm = {
        id: null, tipo,
        data_emissao: this.today(), vencimento: this.today(),
        vencimento_tipo: 'uma_vez', num_parcelas: '',
        tipo_contato: '', contato_id: '',
        descricao: '', documento: '',
        valor_str: '', acrescimo_str: '', acrescimo_tipo: 'R$',
        desconto_str: '', desconto_tipo: 'R$',
        valor_total: 0,
        conta_id: '', categoria_id: '', centro_id: '',
        meio_pagamento: '', situacao: 'em_aberto',
      };
      this.lancModal = true;
    },

    openLancEdit(l) {
      this.lancForm = {
        id: l.id,
        tipo: l.tipo,
        data_emissao: l.data_emissao ? l.data_emissao.slice(0,10) : this.today(),
        vencimento: l.vencimento ? l.vencimento.slice(0,10) : this.today(),
        tipo_contato: l.tipo_contato || '',
        contato_id: l.contato_id || '',
        descricao: l.descricao || '',
        documento: l.documento || '',
        valor_str: l.valor ? String(l.valor).replace('.', ',') : '',
        acrescimo_str: l.acrescimo ? String(l.acrescimo).replace('.', ',') : '',
        acrescimo_tipo: l.acrescimo_tipo || 'R$',
        desconto_str: l.desconto ? String(l.desconto).replace('.', ',') : '',
        desconto_tipo: l.desconto_tipo || 'R$',
        valor_total: l.valor_total || l.valor || 0,
        vencimento_tipo: l.vencimento_tipo || 'uma_vez',
        num_parcelas: l.num_parcelas || '',
        conta_id: l.conta_id || '',
        categoria_id: l.categoria_id || '',
        centro_id: l.centro_id || '',
        meio_pagamento: l.meio_pagamento || '',
        situacao: l.situacao || 'em_aberto',
      };
      this.lancModal = true;
    },

    recalcTotal() {
      const valor = this.parseBRL(this.lancForm.valor_str);
      const acr = this.parseBRL(this.lancForm.acrescimo_str);
      const desc = this.parseBRL(this.lancForm.desconto_str);
      let total = valor;
      if (this.lancForm.acrescimo_tipo === '%') total += valor * acr / 100;
      else total += acr;
      if (this.lancForm.desconto_tipo === '%') total -= valor * desc / 100;
      else total -= desc;
      this.lancForm.valor_total = Math.max(0, total);
    },

    async saveLanc() {
      if (!this.lancForm.descricao.trim()) { this.showToast('Descrição obrigatória', 'error'); return; }
      this.saving = true;
      try {
        const payload = {
          tipo: this.lancForm.tipo,
          emissao: this.lancForm.data_emissao,
          vencimento: this.lancForm.vencimento,
          tipo_contato: this.lancForm.tipo_contato || null,
          contato_id: this.lancForm.contato_id || null,
          descricao: this.lancForm.descricao,
          documento: this.lancForm.documento || null,
          valor: this.parseBRL(this.lancForm.valor_str),
          acrescimo: this.parseBRL(this.lancForm.acrescimo_str),
          acrescimo_tipo: this.lancForm.acrescimo_tipo,
          desconto: this.parseBRL(this.lancForm.desconto_str),
          desconto_tipo: this.lancForm.desconto_tipo,
          valor_total: this.lancForm.valor_total,
          conta_id: this.lancForm.conta_id || null,
          categoria_id: this.lancForm.categoria_id || null,
          centro_id: this.lancForm.centro_id || null,
          meio_pagamento: this.lancForm.meio_pagamento || null,
          situacao: this.lancForm.situacao,
        };
        if (this.lancForm.id) {
          await this.api('PUT', `/api/fin/lancamentos/${this.lancForm.id}`, payload);
          this.showToast('Lançamento atualizado');
        } else {
          await this.api('POST', '/api/fin/lancamentos', payload);
          this.showToast('Lançamento criado');
        }
        this.lancModal = false;
        await this.loadLancamentos();
      } catch(e) { this.showToast(e.message, 'error'); }
      finally { this.saving = false; }
    },

    async quitarLanc(l) {
      try {
        await this.api('PATCH', `/api/fin/lancamentos/${l.id}/quitar`);
        l.situacao = 'quitado';
        await this.loadLancamentos();
        this.showToast('Lançamento quitado');
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    async quitarLote() {
      if (!this.selectedIds.length) return;
      try {
        const r = await this.api('PATCH', '/api/fin/lancamentos/quitar-lote', { ids: this.selectedIds });
        this.selectedIds = [];
        await this.loadLancamentos();
        this.showToast(`${r.count} lançamento(s) atualizados`);
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    async deleteLanc(id) {
      if (!confirm('Excluir este lançamento?')) return;
      try {
        await this.api('DELETE', `/api/fin/lancamentos/${id}`);
        this.showToast('Lançamento excluído');
        await this.loadLancamentos();
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    /* ══════════════════════════ FLUXO DE CAIXA ══════════════════════════ */
    async loadFluxo() {
      this.fluxoLoading = true;
      try {
        const data = await this.api('GET', `/api/fin/fluxo-caixa?ano=${this.fluxoAno}`);
        this.fluxo = data.fluxo || [];
        this.fluxoLoading = false;   // must be false before nextTick so canvas is rendered
        await this.$nextTick();
        this.initFluxoChart();
      } catch(e) { this.showToast(e.message, 'error'); this.fluxoLoading = false; }
    },

    initFluxoChart() {
      const canvas = document.getElementById('fluxoChart');
      if (!canvas) return;
      if (canvas._chartInstance) { canvas._chartInstance.destroy(); }
      const labels = this.fluxo.map(m => m.label);
      const receber = this.fluxo.map(m => m.realizado ? m.recebidos : m.receber);
      const pagar   = this.fluxo.map(m => m.realizado ? m.pagos : m.pagar);
      const saldoOp = this.fluxo.map(m => m.saldo_op);
      const saldoAc = this.fluxo.map(m => m.saldo_acum);
      canvas._chartInstance = new Chart(canvas, {
        data: {
          labels,
          datasets: [
            { type: 'bar', label: 'Receitas', data: receber, backgroundColor: '#4caf5060', borderColor: '#4caf50', borderWidth: 1 },
            { type: 'bar', label: 'Despesas', data: pagar, backgroundColor: '#ef535060', borderColor: '#ef5350', borderWidth: 1 },
            { type: 'line', label: 'Saldo Operacional', data: saldoOp, borderColor: '#ffc107', backgroundColor: 'transparent', tension: 0.3, pointRadius: 3 },
            { type: 'line', label: 'Saldo Acumulado', data: saldoAc, borderColor: '#00bcd4', backgroundColor: 'transparent', tension: 0.3, pointRadius: 3 },
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#aaa', font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: '#888' }, grid: { color: '#ffffff10' } },
            y: { ticks: { color: '#888', callback: v => 'R$'+v.toLocaleString('pt-BR') }, grid: { color: '#ffffff10' } }
          }
        }
      });
    },


    /* ══════════════════════════ TRANSFERÊNCIAS ══════════════════════════ */
    async loadTransferencias() {
      this.loading = true;
      try {
        const data = await this.api('GET', `/api/fin/transferencias?mes=${this.currentMes}`);
        this.transferencias = Array.isArray(data) ? data : (data.transferencias || []);
      } catch(e) { this.showToast(e.message, 'error'); }
      finally { this.loading = false; }
    },

    openTransfModal() {
      this.transfForm = {
        data_emissao: this.today(), valor_str: '',
        conta_de_id: '', conta_para_id: '', comentario: '',
      };
      this.transfModal = true;
    },

    async saveTransf() {
      this.saving = true;
      try {
        await this.api('POST', '/api/fin/transferencias', {
          data_emissao: this.transfForm.data_emissao,
          valor: this.parseBRL(this.transfForm.valor_str),
          conta_de_id: this.transfForm.conta_de_id || null,
          conta_para_id: this.transfForm.conta_para_id || null,
          comentario: this.transfForm.comentario || null,
        });
        this.transfModal = false;
        this.showToast('Transferência registrada');
        if (this.currentSection === 'transferencias') await this.loadTransferencias();
      } catch(e) { this.showToast(e.message, 'error'); }
      finally { this.saving = false; }
    },

    async deleteTransf(id) {
      if (!confirm('Excluir esta transferência?')) return;
      try {
        await this.api('DELETE', `/api/fin/transferencias/${id}`);
        this.showToast('Transferência excluída');
        await this.loadTransferencias();
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    /* ══════════════════════════ CONTAS ══════════════════════════ */
    async loadContas() {
      try {
        const data = await this.api('GET', '/api/fin/contas');
        this.contas = Array.isArray(data) ? data : (data.contas || []);
      } catch(e) { /* silent */ }
    },

    openContaModal() {
      this.contaForm = { id: null, nome: '', situacao: 'ativa', saldo_inicial_str: '' };
      this.contaModal = true;
    },

    openContaEdit(c) {
      this.contaForm = {
        id: c.id, nome: c.nome, situacao: c.situacao || 'ativa',
        saldo_inicial_str: c.saldo_inicial ? String(c.saldo_inicial).replace('.', ',') : '',
      };
      this.contaModal = true;
    },

    async saveConta() {
      if (!this.contaForm.nome.trim()) { this.showToast('Nome obrigatório', 'error'); return; }
      this.saving = true;
      try {
        const payload = {
          nome: this.contaForm.nome,
          situacao: this.contaForm.situacao,
          saldo_inicial: this.parseBRL(this.contaForm.saldo_inicial_str),
        };
        if (this.contaForm.id) {
          await this.api('PUT', `/api/fin/contas/${this.contaForm.id}`, payload);
          this.showToast('Conta atualizada');
        } else {
          await this.api('POST', '/api/fin/contas', payload);
          this.showToast('Conta criada');
        }
        this.contaModal = false;
        await this.loadContas();
      } catch(e) { this.showToast(e.message, 'error'); }
      finally { this.saving = false; }
    },

    async deleteConta(id) {
      if (!confirm('Excluir esta conta corrente?')) return;
      try {
        await this.api('DELETE', `/api/fin/contas/${id}`);
        this.showToast('Conta excluída');
        await this.loadContas();

    /* ══════════════════════════ ANÁLISE ══════════════════════════ */

    async loadDashboard(de = '', ate = '') {
      this.dashLoading = true;
      try {
        const params = new URLSearchParams();
        if (de)  params.set('de', de);
        if (ate) params.set('ate', ate);
        const qs = params.toString() ? '?' + params.toString() : '';
        this.dashData = await this.api('GET', '/api/fin/dashboard-sheets' + qs);
        // On first load, set De/Até to full range (YYYY-MM format)
        if (!this.dashDe) {
          const meses = (this.dashData.siga_mensal || []).map(s => s.mes);
          if (meses.length) {
            this.dashDe  = this._mesLabelToYM(meses[0]);
            this.dashAte = this._mesLabelToYM(meses[meses.length - 1]);
            this.mp.viewYear = parseInt(this.dashDe.split('-')[0]);
          }
        }
        await new Promise(r => setTimeout(r, 120));
        this.initCharts();
      } catch(e) { this.showToast('Erro ao carregar dados: ' + e.message, 'error'); }
      finally { this.dashLoading = false; }
    },

    async applyDashFilter() {
      await this.loadDashboard(this.dashDe, this.dashAte);
    },

    initDashboard() {
      if (this.dashData) this.initCharts();
      else this.loadDashboard(this.dashDe, this.dashAte);
    },

    /* ── Month picker helpers ── */
    _mesLabelToYM(label) {  // "Set/24" → "2024-09"
      const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      const [abbr, yy] = label.split('/');
      const m = MESES.indexOf(abbr) + 1;
      return `20${yy}-${String(m).padStart(2,'0')}`;
    },
    mpFmtLabel(ym) {  // "2024-09" → "Set/24"
      if (!ym) return '—';
      const [y, m] = ym.split('-');
      return `${this.mpMonthLabels[parseInt(m)-1]}/${y.slice(2)}`;
    },
    mpBtnLabel(target) {
      const fmt = ym => this.mpFmtLabel(ym);
      if (target === 'dash') {
        if (!this.dashDe) return 'Todo o período';
        return `${fmt(this.dashDe)} – ${fmt(this.dashAte)}`;
      }
      if (!this.cartaoDe) return 'Todo o período';
      return `${fmt(this.cartaoDe)} – ${fmt(this.cartaoAte)}`;
    },
    openMp(target) {
      const de  = target === 'dash' ? this.dashDe  : this.cartaoDe;
      const ate = target === 'dash' ? this.dashAte : this.cartaoAte;
      this.mp.target = target;
      this.mp.since  = de  || null;
      this.mp.until  = ate || null;
      this.mp.step   = (de && ate) ? 2 : 0;
      this.mp.viewYear = de ? parseInt(de.split('-')[0]) : new Date().getFullYear() - 1;
      this.mp.open = true;
    },
    mpClick(year, month) {
      const ym = `${year}-${String(month).padStart(2,'0')}`;
      if (this.mp.step === 0 || this.mp.step === 2) {
        this.mp.since = ym; this.mp.until = null; this.mp.step = 1;
      } else {
        if (ym < this.mp.since) { this.mp.until = this.mp.since; this.mp.since = ym; }
        else { this.mp.until = ym; }
        this.mp.step = 2;
      }
    },
    mpMonthClass(year, month) {
      const ym = `${year}-${String(month).padStart(2,'0')}`;
      const { since, until } = this.mp;
      if (!since) return '';
      const lo = since, hi = until || since;
      if (ym === lo && ym === hi) return 'mp-sel-start mp-sel-end';
      if (ym === lo)  return 'mp-sel-start';
      if (ym === hi)  return 'mp-sel-end';
      if (ym > lo && ym < hi) return 'mp-in-range';
      return '';
    },
    mpPrevYear() { this.mp.viewYear--; },
    mpNextYear() { this.mp.viewYear++; },
    async applyMp() {
      if (!this.mp.since) return;
      const since = this.mp.since;
      const until = this.mp.until || this.mp.since;
      this.mp.open = false;
      if (this.mp.target === 'dash') {
        this.dashDe = since; this.dashAte = until;
        await this.applyDashFilter();
      } else {
        this.cartaoDe = since; this.cartaoAte = until;
        this.cartaoData = null;
        await this.loadCartaoAnalise();
      }
    },

    async loadCartaoAnalise() {
      if (this.cartaoData) { await this.$nextTick(); await this.$nextTick(); this.initCartaoCharts(); return; }
      this.cartaoLoading = true;
      try {
        const p = new URLSearchParams();
        if (this.cartaoDe)  p.set('de',  this.cartaoDe);
        if (this.cartaoAte) p.set('ate', this.cartaoAte);
        const qs = p.toString() ? '?' + p.toString() : '';
        this.cartaoData = await this.api('GET', '/api/fin/cartao-analise' + qs);
      } catch(e) { this.showToast('Erro ao carregar faturas: ' + e.message, 'error'); }
      finally { this.cartaoLoading = false; }
      await this.$nextTick();

    async loadImportacoes() {
      try {
        const d = await this.api('GET', '/api/fin/importacoes');
        this.importacoes = d.importacoes || [];
      } catch(e) {}
    },

    handleImpDrop(e) {
      const file = e.dataTransfer?.files?.[0];
      if (file) this.uploadExtrato(file);
    },

    async uploadExtrato(file) {
      if (!file) return;
      this.impFileName = file.name;
      this.impStep = 'processing';
      const fd = new FormData();
      fd.append('arquivo', file);
      if (this.impContaId) fd.append('conta_id', this.impContaId);
      try {
        const resp = await fetch('/api/fin/importar', {
          method: 'POST',
          body: fd,
          credentials: 'include',
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Erro ao processar arquivo');
        this.impId = data.id;
        await this.abrirImportacao(data.id);
        this.showToast(`${data.total} lançamentos encontrados`);
      } catch(e) {
        this.impStep = 'upload';
        this.showToast(e.message, 'error');
      }
    },

    async abrirImportacao(id) {
      this.impId = id;
      try {
        const d = await this.api('GET', `/api/fin/importacoes/${id}/itens`);
        this.impItens = (d.itens || []).map(i => ({ ...i, _sel: i.status === 'pendente', _editing: false, _orig: null }));
        this.impStep = 'review';
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    async salvarItemEdit(item) {
      try {
        await this.api('PUT', `/api/fin/importacao-item/${item.id}`, {
          data_lancamento: item.data_lancamento,
          descricao: item.descricao,
          valor: parseFloat(item.valor) || 0,
          tipo: item.tipo,
          categoria_id: item.categoria_id || null,
          conta_id: item.conta_id || null,
        });
        item._editing = false;
        this.showToast('Salvo');
      } catch(e) { this.showToast('Erro ao salvar: ' + e.message, 'error'); }
    },

    async aprovarSelecionados() {
      const ids = this.impItens.filter(i => i._sel && i.status === 'pendente').map(i => i.id);
      if (!ids.length) return;
      try {
        const d = await this.api('POST', `/api/fin/importacoes/${this.impId}/aprovar`, { item_ids: ids });
        this.showToast(`${d.aprovados} lançamentos criados`);
        await this.abrirImportacao(this.impId);
        await this.loadImportacoes();
      } catch(e) { this.showToast(e.message, 'error'); }
    },

    async rejeitarItem(item) {
      const era = item.status;
      try {
        await this.api('DELETE', `/api/fin/importacao-item/${item.id}`);
        this.impItens = this.impItens.filter(i => i.id !== item.id);
        if (era === 'aprovado') this.showToast('Item e lançamento removidos');
      } catch(e) { this.showToast(e.message, 'error'); }
    },
  };
};
</script>
</body>
</html>
